<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 515">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#16305c"/>
      <stop offset="60%" stop-color="#0e2244"/>
      <stop offset="100%" stop-color="#081630"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e2a0"/>
      <stop offset="45%" stop-color="#e3bc62"/>
      <stop offset="100%" stop-color="#a97e2c"/>
    </linearGradient>
    <linearGradient id="gold2V" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e2a0"/>
      <stop offset="100%" stop-color="#bd934a"/>
    </linearGradient>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="515" fill="url(#bg2)"/>
  <g fill="none" stroke="#f3d680" opacity=".07">
    <circle cx="700" cy="260" r="420" stroke-width="1.5"/>
    <circle cx="700" cy="260" r="300" stroke-width="1"/>
  </g>

  <!-- RING LIGHT quanh người -->
  <circle cx="700" cy="262" r="215" fill="#f3d680" opacity=".07"/>
  <g filter="url(#glow2)">
    <circle cx="700" cy="262" r="192" fill="none" stroke="url(#gold2)" stroke-width="18"/>
  </g>
  <circle cx="700" cy="262" r="172" fill="none" stroke="#f7e2a0" stroke-width="2.5" opacity=".5"/>

  <!-- NGƯỜI ĐẠI DIỆN -->
  <g fill="url(#gold2V)" filter="url(#softglow2)">
    <circle cx="700" cy="212" r="62"/>
    <path d="M700 284c-76 0-133 51-139 126-1 11 7 18 18 18h242c11 0 19-7 18-18-6-75-63-126-139-126z"/>
  </g>
  <!-- cổ áo vest -->
  <path d="M670 288l30 42 30-42" fill="none" stroke="#0c1f3f" stroke-width="7" stroke-linecap="round"/>
  <path d="M700 330l-11 38 11 30 11-30z" fill="#0c1f3f" opacity=".85"/>

  <!-- MICRO cầm tay -->
  <g transform="translate(812 300) rotate(24)">
    <rect x="-10" y="0" width="20" height="84" rx="10" fill="url(#gold2)"/>
    <circle cx="0" cy="-14" r="28" fill="#0c1f3f" stroke="url(#gold2)" stroke-width="6"/>
    <path d="M-14 -24a28 28 0 0 1 28 0M-17 -14a34 34 0 0 1 34 0" stroke="#f3d680" stroke-width="3" fill="none" opacity=".7"/>
  </g>

  <!-- BIỂU TƯỢNG TƯƠNG TÁC hai bên -->
  <g filter="url(#softglow2)">
    <!-- tim -->
    <g transform="translate(430 140)">
      <circle r="38" fill="#0c1f3f" stroke="url(#gold2)" stroke-width="4.5"/>
      <path d="M0 16c-22-19 -4-43 0-26 4-17 22 7 0 26z" fill="#e05a4e"/>
    </g>
    <!-- like -->
    <g transform="translate(400 370)">
      <circle r="38" fill="#0c1f3f" stroke="url(#gold2)" stroke-width="4.5"/>
      <path d="M-14 0h7v16h-7zM-3 16h19c4 0 7-3 8-7l3-12c1-4-2-8-6-8h-10l3-10c1-4-5-8-8-4l-9 14v20z" fill="#f3d680" transform="translate(0 -10)"/>
    </g>
    <!-- ngôi sao -->
    <g transform="translate(970 140)">
      <circle r="38" fill="#0c1f3f" stroke="url(#gold2)" stroke-width="4.5"/>
      <path d="M0-21l6 13 15 2-11 10 3 15-13-7-13 7 3-15-11-10 15-2z" fill="#f3d680"/>
    </g>
    <!-- vương miện uy tín -->
    <g transform="translate(1000 370)">
      <circle r="38" fill="#0c1f3f" stroke="url(#gold2)" stroke-width="4.5"/>
      <path d="M-21 9l-3-23 12 9 12-17 12 17 12-9-3 23z" fill="#f3d680"/>
      <rect x="-21" y="11" width="42" height="7" rx="3" fill="#f3d680"/>
    </g>
    <!-- LIVE badge trái -->
    <g transform="translate(220 255)">
      <rect x="-64" y="-26" width="128" height="52" rx="26" fill="#c23b2e"/>
      <circle cx="-34" cy="0" r="8" fill="#fff"/>
      <text x="-16" y="11" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#fff">LIVE</text>
    </g>
    <!-- lượt xem phải -->
    <g transform="translate(1180 255)">
      <rect x="-74" y="-26" width="148" height="52" rx="26" fill="none" stroke="url(#gold2)" stroke-width="3"/>
      <path d="M-46 0c8-11 24-11 32 0-8 11-24 11-32 0z" fill="none" stroke="#f3d680" stroke-width="3"/>
      <circle cx="-30" cy="0" r="4.5" fill="#f3d680"/>
      <text x="-6" y="10" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="bold" fill="#f3d680">12,5K</text>
    </g>
  </g>

  <!-- SAO LẤP LÁNH -->
  <g fill="#f3d680">
    <path d="M320 80l6 17 17 6-17 6-6 17-6-17-17-6 17-6z" opacity=".8"/>
    <path d="M1080 80l5 14 14 5-14 5-5 14-5-14-14-5 14-5z" opacity=".6"/>
    <path d="M550 60l5 14 14 5-14 5-5 14-5-14-14-5 14-5z" opacity=".7"/>
    <path d="M860 448l4 11 11 4-11 4-4 11-4-11-11-4 11-4z" opacity=".5"/>
    <path d="M180 430l4 11 11 4-11 4-4 11-4-11-11-4 11-4z" opacity=".5"/>
    <path d="M1230 430l4 11 11 4-11 4-4 11-4-11-11-4 11-4z" opacity=".5"/>
  </g>
</svg>
