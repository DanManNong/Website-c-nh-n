<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#16305c"/>
      <stop offset="60%" stop-color="#0e2244"/>
      <stop offset="100%" stop-color="#081630"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e2a0"/>
      <stop offset="45%" stop-color="#e3bc62"/>
      <stop offset="100%" stop-color="#a97e2c"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e2a0"/>
      <stop offset="100%" stop-color="#bd934a"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3d680" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#c79b45" stop-opacity=".95"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="1100" fill="url(#bg)"/>
  <g fill="none" stroke="#f3d680" opacity=".07">
    <circle cx="550" cy="530" r="470" stroke-width="1.5"/>
    <circle cx="550" cy="530" r="380" stroke-width="1"/>
    <circle cx="550" cy="530" r="290" stroke-width="1"/>
  </g>

  <!-- tia sáng sau điện thoại -->
  <circle cx="550" cy="520" r="330" fill="#f3d680" opacity=".06"/>
  <circle cx="550" cy="520" r="240" fill="#f3d680" opacity=".05"/>

  <!-- ĐIỆN THOẠI -->
  <g filter="url(#glow)">
    <rect x="332" y="150" width="436" height="790" rx="64" fill="#0c1f3f" stroke="url(#gold)" stroke-width="14"/>
  </g>
  <rect x="470" y="176" width="160" height="14" rx="7" fill="url(#gold)" opacity=".8"/>

  <!-- LIVE badge -->
  <g filter="url(#softglow)">
    <rect x="376" y="216" width="128" height="52" rx="26" fill="#c23b2e"/>
    <circle cx="406" cy="242" r="8" fill="#fff"/>
    <text x="424" y="253" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#fff">LIVE</text>
  </g>
  <!-- lượt xem -->
  <g>
    <rect x="576" y="216" width="148" height="52" rx="26" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <path d="M604 242c8-11 24-11 32 0-8 11-24 11-32 0z" fill="none" stroke="#f3d680" stroke-width="3"/>
    <circle cx="620" cy="242" r="4.5" fill="#f3d680"/>
    <text x="644" y="252" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="bold" fill="#f3d680">12,5K</text>
  </g>

  <!-- NGƯỜI DẪN SÓNG -->
  <g fill="url(#goldV)" filter="url(#softglow)">
    <circle cx="550" cy="480" r="78"/>
    <path d="M550 570c-96 0-168 64-176 158-1 14 8 24 22 24h308c14 0 23-10 22-24-8-94-80-158-176-158z"/>
  </g>
  <!-- micro cài áo -->
  <circle cx="550" cy="620" r="12" fill="#0c1f3f" stroke="#f7e2a0" stroke-width="3"/>

  <!-- SẢN PHẨM trên tay -->
  <g transform="translate(430 640) rotate(-8)">
    <rect width="86" height="86" rx="12" fill="#0c1f3f" stroke="url(#gold)" stroke-width="5"/>
    <path d="M20 26h46M20 43h46M20 60h30" stroke="#f3d680" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- BÌNH LUẬN -->
  <g opacity=".92">
    <rect x="376" y="770" width="230" height="46" rx="23" fill="#13294f" stroke="#f3d680" stroke-width="2" opacity=".9"/>
    <circle cx="404" cy="793" r="12" fill="url(#gold)"/>
    <rect x="426" y="787" width="150" height="12" rx="6" fill="#f3d680" opacity=".65"/>
    <rect x="396" y="838" width="190" height="46" rx="23" fill="#13294f" stroke="#f3d680" stroke-width="2" opacity=".65"/>
    <circle cx="424" cy="861" r="12" fill="url(#gold)" opacity=".8"/>
    <rect x="446" y="855" width="110" height="12" rx="6" fill="#f3d680" opacity=".5"/>
  </g>

  <!-- TIM BAY -->
  <g fill="#e05a4e" filter="url(#softglow)">
    <path d="M694 742c-16-18 6-42 22-26 16-16 38 8 22 26l-22 22z" opacity=".95"/>
    <path d="M724 652c-12-14 5-32 17-20 12-12 29 6 17 20l-17 17z" opacity=".7" fill="#f3d680"/>
    <path d="M700 572c-10-11 4-25 13-15 9-10 23 4 13 15l-13 13z" opacity=".5"/>
  </g>

  <!-- GIỎ HÀNG + ĐƠN -->
  <g transform="translate(760 820)" filter="url(#softglow)">
    <circle cx="60" cy="60" r="86" fill="#0c1f3f" stroke="url(#gold)" stroke-width="6"/>
    <path d="M22 34h14l12 44h50l12-34H44" fill="none" stroke="#f3d680" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="52" cy="96" r="8" fill="#f3d680"/>
    <circle cx="92" cy="96" r="8" fill="#f3d680"/>
    <circle cx="118" cy="14" r="26" fill="#c23b2e"/>
    <text x="118" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#fff">+1</text>
  </g>

  <!-- ĐỒNG XU -->
  <g transform="translate(206 780)">
    <ellipse cx="60" cy="94" rx="58" ry="20" fill="url(#gold)" opacity=".9"/>
    <ellipse cx="60" cy="74" rx="58" ry="20" fill="url(#goldV)"/>
    <ellipse cx="60" cy="54" rx="58" ry="20" fill="url(#gold)"/>
    <ellipse cx="60" cy="50" rx="44" ry="13" fill="#f7e2a0" opacity=".7"/>
  </g>

  <!-- SAO LẤP LÁNH -->
  <g fill="#f3d680">
    <path d="M262 258l7 20 20 7-20 7-7 20-7-20-20-7 20-7z" opacity=".9"/>
    <path d="M842 318l5 15 15 5-15 5-5 15-5-15-15-5 15-5z" opacity=".7"/>
    <path d="M812 176l4 11 11 4-11 4-4 11-4-11-11-4 11-4z" opacity=".5"/>
    <path d="M250 560l4 11 11 4-11 4-4 11-4-11-11-4 11-4z" opacity=".5"/>
  </g>
</svg>
