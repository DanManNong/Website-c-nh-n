<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Tự động hoá kinh doanh | Nguyễn Tấn Phong</title>
<meta name="theme-color" content="#1a1a1a">
<link rel="icon" href="/favicon.ico" sizes="any">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<style>
  :root{--navy:#1a1a1a;--gold:#E0AA79;--gold2:#f0c896;--text:#fff;--soft:rgba(255,255,255,.55);--border:rgba(224,170,121,.25);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:max(24px,env(safe-area-inset-top)) 22px 40px;line-height:1.6}
  .eyebrow{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--soft);margin-bottom:14px}
  .icon{font-size:40px;color:var(--gold);margin-bottom:20px}
  h1{font-size:clamp(22px,5vw,32px);font-weight:800;max-width:620px;margin-bottom:16px}
  p{color:var(--soft);max-width:520px;font-size:15px;margin-bottom:28px}
  .badge{display:inline-block;margin-bottom:18px;padding:5px 14px;border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  a.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;transition:all .2s}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy)}
  .btn-ghost{border:1px solid var(--border);color:var(--gold)}
  .btn-ghost:hover{border-color:var(--gold)}
</style>
</head>
<body>
  <div class="eyebrow">Thư viện chuyên đề</div>
  <div class="icon"><i class="fas fa-robot"></i></div>
  
  <h1>Tự động hoá kinh doanh</h1>
  <p>Nội dung đang được biên soạn. Để lại thông tin để nhận tài liệu ngay khi phát hành.</p>
  <div class="actions">
    <a class="btn btn-gold" href="/#Z12"><i class="fas fa-bell"></i> Đăng ký nhận tài liệu</a>
    <a class="btn btn-ghost" href="/"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
  </div>
</body>
</html>
