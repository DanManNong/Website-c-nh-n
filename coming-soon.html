<style>
  :root {
    --navy: #1a1a1a;
    --gold: #E0AA79;
    --gold-light: #f0c896;
    --cream: #2C2C2C;
    --text: #FFFFFF;
    --text-soft: rgba(255,255,255,0.5);
    --border: rgba(224, 170, 121, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 32px 24px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c0-16.57 13.43-30 30-30m0 60c-16.57 0-30-13.43-30-30M30 30C30 46.57 16.57 60 0 60M0 0c16.57 0 30 13.43 30 30' fill='none' stroke='%23E0AA79' stroke-width='0.6' stroke-opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: -1;
  }
  a { color: inherit; text-decoration: none; }

  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  /* AVATAR */
  .avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid rgba(224,170,121,0.3);
    margin: 0 auto 28px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* NAME */
  .name {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .title-line {
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin: 20px 0 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* PHONE */
  .phone-block {
    margin-bottom: 32px;
  }
  .phone-number {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .phone-label {
    font-size: 9px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* QR + CONTACT GRID */
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 36px;
  }
  .qr-image-cell {
    grid-column: span 2;
    grid-row: span 2;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .qr-image-cell img { width: 100%; height: 100%; object-fit: contain; filter: grayscale(1); }
  .qr-link {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 6px;
    transition: all 0.2s;
    aspect-ratio: 1;
  }
  .qr-link:hover { border-color: var(--gold); background: rgba(224,170,121,0.08); transform: translateY(-2px); }
  .qr-link i { color: var(--gold); font-size: 1.6rem; line-height: 1; }
  .qr-link span { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-top: 4px; }
  @media (max-width: 480px) {
    .qr-link i { font-size: 1.3rem; }
    .qr-link span { font-size: 8px; }
  }

  /* SAVE CONTACT BUTTON */
  .save-contact {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 18px 24px;
    margin-bottom: 28px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(224,170,121,0.35);
    transition: all 0.25s ease;
  }
  .save-contact:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(224,170,121,0.5);
  }
  .save-contact:active { transform: translateY(0); }
  .save-contact i { font-size: 18px; }
  @media (max-width: 480px) {
    .save-contact { font-size: 13px; padding: 15px 18px; gap: 10px; }
    .save-contact i { font-size: 16px; }
  }

  /* FOOTER */
  .footer-copy {
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--text-soft);
    opacity: 0.4;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .stagger { opacity: 0; animation: fadeUp 1.2s forwards; }
  .s2 { animation-delay: 0.2s; }
  .s3 { animation-delay: 0.4s; }
  .s4 { animation-delay: 0.6s; }
  .s5 { animation-delay: 0.8s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ========== STAGING BANNER ========== */
  #stagingBanner {
    display: none;
    position: fixed;
    top: 0; left: 0;
    z-index: 2000;
    width: 100%;
    background: linear-gradient(90deg, #ED1C24, #FF6B3D, #ED1C24);
    background-size: 200% 100%;
    animation: stagingShimmer 4s ease infinite;
    color: #fff;
    text-align: center;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    box-shadow: 0 2px 20px rgba(237, 28, 36, 0.45);
  }
  #stagingBanner.show { display: block; }
  #stagingBanner span { opacity: 0.92; }
  @keyframes stagingShimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @media (max-width: 480px) {
    #stagingBanner { font-size: 9.5px; letter-spacing: 0.15em; padding: 7px 10px; }
  }

  /* ========== TAB BAR (Đơn giản / Đầy đủ) ========== */
  .tab-bar {
    position: sticky;

    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    text-decoration: none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    transition: all 0.25s ease;
    letter-spacing: 0.02em;
  }
  .tab-btn:hover {
    color: var(--gold-light);
    border-color: var(--gold);
    background: rgba(224,170,121,0.05);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    border-color: var(--gold);
    box-shadow: 0 4px 14px rgba(224,170,121,0.3);
  }
  .tab-btn i { font-size: 12px; }
  @media (max-width: 480px) {
    .tab-bar { padding: 8px 10px; gap: 6px; }
    .tab-btn { font-size: 12px; padding: 9px 10px; gap: 6px; }
  }
</style>
</head>

        "NOTE:Tri Thức · Pháp Luật · Công Nghệ",
        "END:VCARD"
