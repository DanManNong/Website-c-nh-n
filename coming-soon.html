<style>
  :root {
    --navy: #1a1a1a;
    --gold: #E0AA79;
    --gold-light: #f0c896;
    --cream: #2C2C2C;
    --text: #FFFFFF;
    --text-soft: rgba(255,255,255,0.5);
    --border: rgba(224, 170, 121, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    position: relative;
    /* Top & bottom padding cân đối — khoảng cách top đến tab bar = bottom đến © */
    padding: 20px 24px 20px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c0-16.57 13.43-30 30-30m0 60c-16.57 0-30-13.43-30-30M30 30C30 46.57 16.57 60 0 60M0 0c16.57 0 30 13.43 30 30' fill='none' stroke='%23E0AA79' stroke-width='0.6' stroke-opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: -1;
  }
  a { color: inherit; text-decoration: none; }

  /* Accessibility — focus states rõ ràng cho keyboard navigation */
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
    border-radius: 6px;
  }

  .card {
    max-width: 504px;
    width: 100%;
    text-align: center;
  }

  /* TAGLINE (trên cùng — tab bar đã ẩn) */
  .tagline-top {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin: 20px 0 20px;
  }

  /* AVATAR — to lên 20% */
  .avatar {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 2px solid rgba(224,170,121,0.3);
    margin: 20px auto 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* NAME — 1 dòng, chữ "Phong" bold */
  .name {
    font-size: 1.45rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    white-space: nowrap;
  }
  .name strong { font-weight: 700; }
  .title-line {
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 5px;
    line-height: 1.45;
  }
  /* Gap title cuối → QR: thêm chiều cao nút Lưu Danh Bạ (~52px) ≈ 36 + 52 = 88 */
  .title-line:last-child { margin-bottom: 88px; }

  /* LANGUAGE SWITCHER — top right */
  .lang-switcher {
    position: fixed;
    top: 14px;
    right: 16px;
    display: flex;
    gap: 4px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
  }
  .lang-switcher a {
    display: inline-block;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-soft);
    border-radius: 5px;
    transition: all 0.2s;
  }
  .lang-switcher a:hover { color: var(--gold-light); }
  .lang-switcher a.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
  }
  @media (max-width: 480px) {
    .lang-switcher { top: 10px; right: 10px; padding: 2px; gap: 2px; }
    .lang-switcher a { padding: 3px 6px; font-size: 9px; }
  }

  /* Divider giữa 2 cụm tiêu đề */
  .title-divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.55;
    margin: 12px auto;
    border: 0;
  }
  @media (max-width: 480px) {
    .title-divider { width: 32px; margin: 9px auto; }
  }

  /* PHONE (đã dời xuống dưới nút Lưu Danh Bạ) */
  .phone-block {
    margin-bottom: 16px;
  }
  .phone-number {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .phone-label {
    font-size: 9px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* SPACER trước chữ ký — cân đối nhẹ */
  .footer-spacer {
    height: 24px;
  }

  /* QR + CONTACT GRID — to 20% (gap + margin) */
  .qr-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 44px;
  }
  .qr-image-cell {
    grid-column: span 2;
    grid-row: span 2;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .qr-image-cell img { width: 100%; height: 100%; object-fit: contain; filter: grayscale(1); }
  .qr-link {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 6px;
    transition: all 0.2s;
    aspect-ratio: 1;
  }
  .qr-link:hover { border-color: var(--gold); background: rgba(224,170,121,0.08); transform: translateY(-2px); }
  .qr-link i { color: var(--gold); font-size: 1.9rem; line-height: 1; }
  .qr-link span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-top: 5px; }
  @media (max-width: 480px) {
    .qr-link i { font-size: 1.55rem; }
    .qr-link span { font-size: 9.5px; }
  }

  /* SAVE CONTACT BUTTON */
  .save-contact {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 24px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(224,170,121,0.35);
    transition: all 0.25s ease;
  }
  .save-contact:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(224,170,121,0.5);
  }
  .save-contact:active { transform: translateY(0); }
  .save-contact i { font-size: 18px; }
  @media (max-width: 480px) {
    .save-contact { font-size: 13px; padding: 13px 18px; gap: 10px; }
    .save-contact i { font-size: 16px; }
  }

  /* FOOTER — đồng bộ với bản 404 */
  .footer-sig-wrap { text-align: center; margin-top: 24px; }
  .footer-sig {
    width: 140px;
    filter: brightness(0) invert(1);
    opacity: 0.85;
    display: block;
    margin: 0 auto 10px;
  }
  .footer-copy {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--text-soft);
    opacity: 0.5;
    text-transform: uppercase;
  }
  @media (max-width: 480px) {
    .footer-sig-wrap { margin-top: 46px; }
    .footer-sig { width: 120px; margin-bottom: 8px; }
    .footer-copy { font-size: 7px; }
  }

  .stagger { opacity: 0; animation: fadeUp 1.2s forwards; }
  .s2 { animation-delay: 0.2s; }
  .s3 { animation-delay: 0.4s; }
  .s4 { animation-delay: 0.6s; }
  .s5 { animation-delay: 0.8s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== MOBILE — fit 1 màn hình, không scroll ===== */
  @media (max-width: 480px) {
    body { padding: 14px 16px 14px; }
    .card { max-width: 432px; }
    .tagline-top { font-size: 9px; letter-spacing: 0.3em; margin: 20px 0 10px; }
    .avatar { width: 130px; height: 130px; margin: 8px auto 12px; border-width: 1.5px; box-shadow: 0 12px 24px rgba(0,0,0,0.35); }
    .name { font-size: 1.1rem; letter-spacing: 0.14em; margin-bottom: 6px; }
    .title-line { font-size: 10.5px; margin-bottom: 3px; line-height: 1.4; }
    /* Mobile: gap + nút Lưu Danh Bạ mobile ~42px → 22 + 42 = 64 */
    .title-line:last-child { margin-bottom: 64px; }
    .qr-grid { gap: 7px; margin-bottom: 17px; }
    .qr-link { padding: 7px 5px; }
    .qr-link span { font-size: 9px; margin-top: 3px; }
    .save-contact { margin-bottom: 14px; padding: 11px 16px; }
    .phone-block { margin-bottom: 10px; }
    .phone-number { font-size: 1.15rem; }
    .phone-label { font-size: 8px; }
    .footer-spacer { height: 10px; }
    .footer-copy { font-size: 7px; }
  }

  /* ========== STAGING BANNER ========== */
  #stagingBanner {
    display: none;
    position: fixed;
    top: 0; left: 0;
    z-index: 2000;
    width: 100%;
    background: linear-gradient(90deg, #ED1C24, #FF6B3D, #ED1C24);
    background-size: 200% 100%;
    animation: stagingShimmer 4s ease infinite;
    color: #fff;
    text-align: center;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    box-shadow: 0 2px 20px rgba(237, 28, 36, 0.45);
  }
  #stagingBanner.show { display: block; }
  #stagingBanner span { opacity: 0.92; }
  @keyframes stagingShimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @media (max-width: 480px) {
    #stagingBanner { font-size: 9.5px; letter-spacing: 0.15em; padding: 7px 10px; }
  }

  /* ========== TAB BAR (Đơn giản / Đầy đủ) — mỏng, dài bằng nút Lưu Danh Bạ ========== */
  .tab-bar {
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    padding: 4px;
    background: rgba(0,0,0,0.35);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 7px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    text-decoration: none;
    background: transparent;
    transition: all 0.25s ease;
    letter-spacing: 0.04em;
  }
  .tab-btn:hover {
    color: var(--gold-light);
    background: rgba(224,170,121,0.05);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    box-shadow: 0 2px 8px rgba(224,170,121,0.25);
  }
  .tab-btn i { font-size: 10px; }
  @media (max-width: 480px) {
    .tab-bar { margin: 0 auto; padding: 3px; gap: 4px; }
    .tab-btn { font-size: 10px; padding: 5px 8px; }
    .tab-btn i { font-size: 9px; }
  }
</style>
</head>
