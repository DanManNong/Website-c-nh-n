<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cẩm Nang Pháp Lý cho Creator Việt Nam 2026 | KLIC</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Cẩm nang pháp lý dành cho KOL/KOC/Creator Việt Nam trước thời điểm các luật mới có hiệu lực 1/7/2026. Phát hành bởi KLIC.">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cẩm nang KLIC">
<style>
  :root{
    --navy:#0f2742; --blue:#1c4e8a; --blue-light:#2f6fb8; --accent:#e8a72e;
    --red:#c0392b; --red-bg:#fdeceа; --green:#1e8449; --green-bg:#eafaf1;
    --ink:#1a2733; --muted:#5b6b7a; --line:#dde5ed; --bg:#f4f7fb; --card:#ffffff;
    --warn-bg:#fff8e6; --warn-border:#e8a72e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.65;font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px}
  h1,h2,h3{line-height:1.25;font-weight:700}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ===== Top alert bar ===== */
  .alertbar{background:var(--red);color:#fff;text-align:center;font-weight:700;font-size:15px;letter-spacing:.3px;position:sticky;top:0;z-index:50;padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));padding-left:calc(14px + env(safe-area-inset-left));padding-right:calc(14px + env(safe-area-inset-right))}
  .alertbar #cd{font-variant-numeric:tabular-nums}

  /* ===== Hero ===== */
  .hero{background:linear-gradient(160deg,var(--navy) 0%,var(--blue) 100%);color:#fff;padding:54px 0 46px;text-align:center}
  .hero .eyebrow{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700}
  .hero h1{font-size:clamp(28px,5vw,46px);margin:12px 0 6px}
  .hero .sub{font-size:clamp(18px,3vw,26px);font-weight:600;color:#cfe0f2}
  .hero .quote{font-style:italic;color:#aebfd2;margin:16px auto 22px;max-width:640px;font-size:17px}
  .hero .laws{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 14px;font-size:14px;color:#d7e4f3;max-width:680px;margin:0 auto}
  .hero .laws span{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:6px 12px;border-radius:20px}

  /* ===== Stats ===== */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:-32px auto 0;position:relative;z-index:5}
  .stat{background:var(--card);border-radius:14px;padding:22px 16px;text-align:center;box-shadow:0 8px 24px rgba(15,39,66,.10);border-top:4px solid var(--accent)}
  .stat .num{font-size:42px;font-weight:800;color:var(--blue);line-height:1}
  .stat .lbl{font-size:13.5px;color:var(--muted);margin-top:8px;font-weight:600}

  /* ===== Generic section ===== */
  section{padding:40px 0}
  .sec-title{font-size:clamp(22px,3.5vw,30px);color:var(--navy);margin-bottom:6px;display:flex;align-items:center;gap:10px}
  .sec-intro{color:var(--muted);margin-bottom:24px;max-width:760px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(15,39,66,.04)}

  /* audience + note */
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .pill-list{list-style:none}
  .pill-list li{padding:7px 0;display:flex;gap:9px;align-items:flex-start}
  .pill-list li::before{content:"✓";color:var(--green);font-weight:800}
  .note{background:var(--warn-bg);border-left:5px solid var(--warn-border);border-radius:8px;padding:16px 18px}
  .note b{color:var(--navy)}

  /* law overview cards */
  .lawcard{border-radius:12px;padding:22px;color:#fff}
  .lawcard.cyber{background:linear-gradient(150deg,#143a63,#1c4e8a)}
  .lawcard.ecom{background:linear-gradient(150deg,#0d5c4a,#13876b)}
  .lawcard.ads{background:linear-gradient(150deg,#7a4a12,#b06f1c)}
  .lawcard h3{font-size:20px;margin-bottom:4px}
  .lawcard .eff{display:inline-block;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:14px;font-size:12.5px;font-weight:700;margin-bottom:12px}
  .lawcard ul{list-style:none}
  .lawcard li{padding:5px 0;font-size:14.5px;padding-left:18px;position:relative}
  .lawcard li::before{content:"→";position:absolute;left:0;color:var(--accent)}
  .verified{font-size:12px;background:rgba(255,255,255,.15);border-radius:6px;padding:6px 10px;margin-top:12px;display:block}

  /* myths */
  .myth{display:flex;gap:12px;padding:14px 0;border-bottom:1px dashed var(--line)}
  .myth:last-child{border-bottom:0}
  .myth .x{color:var(--red);font-weight:800;font-size:18px}
  .myth b{color:var(--navy)}
  .tag-wrong{color:var(--red);font-weight:800}

  /* risk blocks */
  .group-head{background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-weight:700;font-size:15px;letter-spacing:.5px;margin:30px 0 16px}
  .risk{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;overflow:hidden;box-shadow:0 2px 10px rgba(15,39,66,.05)}
  .risk-head{display:flex;gap:14px;align-items:center;padding:16px 20px;background:#f7fafd;border-bottom:1px solid var(--line)}
  .risk-head .no{flex:0 0 46px;height:46px;background:var(--blue);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
  .risk-head h3{font-size:17.5px;color:var(--navy)}
  .risk-body{padding:18px 20px}
  .risk-body p{margin-bottom:10px}
  .block{border-radius:9px;padding:13px 16px;margin:12px 0}
  .block.bad{background:#fdecea;border-left:4px solid var(--red)}
  .block.good{background:#eafaf1;border-left:4px solid var(--green)}
  .block h4{font-size:14px;margin-bottom:8px}
  .block.bad h4{color:var(--red)}
  .block.good h4{color:var(--green)}
  .block ul{list-style:none}
  .block li{padding:4px 0 4px 22px;position:relative;font-size:14.5px}
  .block.bad li::before{content:"✗";position:absolute;left:0;color:var(--red);font-weight:700}
  .block.good li::before{content:"✓";position:absolute;left:0;color:var(--green);font-weight:700}
  .penalty{display:inline-block;background:var(--navy);color:#fff;font-weight:700;font-size:13.5px;padding:7px 14px;border-radius:8px;margin-top:6px}

  /* tables */
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:6px 0;border-radius:8px;scroll-snap-type:x proximity}
  table{width:100%;border-collapse:collapse;font-size:14px;min-width:520px}
  th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--navy);color:#fff;font-weight:600}
  tr:nth-child(even) td{background:#f7fafd}

  /* checklist */
  .check{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(15,39,66,.05)}
  .check .chead{display:flex;gap:12px;align-items:center;margin-bottom:10px}
  .check .step{flex:0 0 auto;background:var(--accent);color:#3a2a06;font-weight:800;border-radius:8px;padding:4px 12px;font-size:14px}
  .check h3{font-size:16.5px;color:var(--navy)}
  .check label{display:flex;gap:10px;align-items:flex-start;padding:6px 0;cursor:pointer;font-size:14.5px}
  .check input{margin-top:5px;width:17px;height:17px;accent-color:var(--blue);flex:0 0 auto}
  .check .arrow{margin-top:10px;font-size:13.5px;color:var(--muted);background:#f7fafd;border-radius:7px;padding:9px 12px;border-left:3px solid var(--blue-light)}

  /* quick ref */
  .qref{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .qref .col{border-radius:12px;padding:20px}
  .qref .never{background:#fdecea;border:1px solid #f1b8b2}
  .qref .always{background:#eafaf1;border:1px solid #abe2c2}
  .qref h3{font-size:17px;margin-bottom:12px}
  .qref .never h3{color:var(--red)}
  .qref .always h3{color:var(--green)}
  .qref ul{list-style:none}
  .qref li{padding:6px 0 6px 24px;position:relative;font-size:14px;border-bottom:1px dashed rgba(0,0,0,.07)}
  .qref li:last-child{border-bottom:0}
  .qref .never li::before{content:"✗";position:absolute;left:0;color:var(--red);font-weight:800}
  .qref .always li::before{content:"✓";position:absolute;left:0;color:var(--green);font-weight:800}

  /* correction callout */
  .fix{background:#eef4fb;border:1px dashed var(--blue-light);border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--blue);margin-top:8px}
  .fix b{color:var(--navy)}

  /* contact / footer */
  .contact{background:linear-gradient(160deg,var(--navy),var(--blue));color:#fff;border-radius:14px;padding:34px;text-align:center}
  .contact h2{font-size:24px;margin-bottom:6px}
  .contact .links{display:flex;flex-direction:column;gap:8px;max-width:520px;margin:18px auto 0;text-align:left}
  .contact .links a,.contact .links span{color:#dbe7f5}
  .contact .links div{background:rgba(255,255,255,.07);padding:10px 14px;border-radius:8px}
  .btn{display:inline-block;background:var(--accent);color:#3a2a06;font-weight:800;padding:13px 28px;border-radius:30px;margin-top:20px}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:26px 20px 40px}
  .disclaimer{max-width:760px;margin:20px auto 0;font-size:12.5px;color:var(--muted);text-align:center}

  /* iOS safe-area for bottom-edge sections */
  .contact{margin-bottom:env(safe-area-inset-bottom)}
  footer{padding-bottom:calc(40px + env(safe-area-inset-bottom))}
  .wrap{padding-left:calc(20px + env(safe-area-inset-left));padding-right:calc(20px + env(safe-area-inset-right))}

  @media(max-width:680px){
    body{font-size:16px}
    .wrap{padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right))}
    .stats{grid-template-columns:1fr;gap:12px}
    .twocol,.qref{grid-template-columns:1fr}
    .laws{font-size:12.5px}
    section{padding:30px 0}
    /* Comfortable iOS tap targets (>=44px) */
    .btn{min-height:50px;display:flex;align-items:center;justify-content:center;width:100%}
    .check label{padding:10px 0;min-height:44px;align-items:center}
    .check input{width:24px;height:24px;border-radius:6px}
    .contact .links a,.contact .links div{min-height:44px;display:flex;align-items:center}
    .hero .laws span{width:100%;text-align:center}
    /* Horizontal data tables: native momentum scroll + swipe hint */
    .tablewrap{position:relative}
    .tablewrap::after{content:"→ vuốt ngang để xem đủ bảng";display:block;font-size:11.5px;color:var(--muted);text-align:right;padding:6px 2px 0;font-style:italic}
    table{min-width:560px;font-size:13.5px}
    th,td{padding:10px 11px}
    .risk-head{padding:14px 16px}
    .risk-head .no{flex-basis:40px;height:40px;font-size:16px}
    .risk-body,.card,.check,.qref .col{padding:16px}
    h1,.sec-title{word-break:break-word}
  }
  /* ===== Password gate (iOS style) ===== */
  #gate{position:fixed;inset:0;z-index:1000;background:linear-gradient(160deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;padding:24px;padding-top:calc(24px + env(safe-area-inset-top));padding-bottom:calc(24px + env(safe-area-inset-bottom))}
  #gate .box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:22px;padding:36px 26px;max-width:380px;width:100%;text-align:center;color:#fff;box-shadow:0 24px 70px rgba(0,0,0,.4)}
  #gate .lock{font-size:44px;line-height:1}
  #gate h2{font-size:21px;margin:14px 0 6px}
  #gate p{color:#cfe0f2;font-size:14px;margin-bottom:22px}
  #gate input{width:100%;font-size:17px;text-align:center;letter-spacing:4px;padding:15px 16px;border-radius:14px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;outline:none;-webkit-appearance:none}
  #gate input::placeholder{color:#9fb4cc;letter-spacing:1px}
  #gate input:focus{border-color:var(--accent);background:rgba(255,255,255,.18)}
  #gate button{width:100%;margin-top:14px;min-height:52px;border:0;border-radius:14px;background:var(--accent);color:#3a2a06;font-weight:800;font-size:16px;cursor:pointer;-webkit-appearance:none;transition:transform .08s}
  #gate button:active{transform:scale(.98)}
  #gate .err{color:#ffd2cc;font-size:13.5px;min-height:18px;margin-top:12px}
  #gate .foot{margin-top:18px;font-size:12px;color:#9fb4cc}
  body.locked{overflow:hidden;height:100vh}

  @media print{
    #gate{display:none!important}
    .alertbar,.btn{display:none}
    body{background:#fff;font-size:12px}
    .hero,.contact,.lawcard{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    section{padding:14px 0}
    .risk,.check,.card{break-inside:avoid;box-shadow:none}
  }
</style>
</head>

    <div class="err" id="gateErr" role="alert"></div>

<script>
(function(){
  var P=window.__P, CK='klic_html';
  function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  async function deriveKey(pw){
    var base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.s),iterations:P.n,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  }
  async function decryptWith(pw){
    var key=await deriveKey(pw);
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.i)},key,b64(P.d));
    return new TextDecoder().decode(plain);
  }
  function startCountdown(){
    var target=new Date('2026-07-01T00:00:00+07:00');
    var el=document.getElementById('cd'); if(!el) return;
    function tick(){var diff=target-new Date();if(diff<=0){el.textContent='ĐÃ CÓ HIỆU LỰC';return;}el.textContent='~'+Math.ceil(diff/86400000)+' NGÀY';}
    tick(); setInterval(tick,3600000);
  }
  function inject(htmlStr){
    document.getElementById('klic-app').innerHTML=htmlStr;
    var g=document.getElementById('gate'); if(g&&g.parentNode) g.parentNode.removeChild(g);
    document.body.classList.remove('locked');
    startCountdown();
  }
  document.addEventListener('DOMContentLoaded',function(){
    var form=document.getElementById('gateForm'),pass=document.getElementById('gatePass'),err=document.getElementById('gateErr');
    try{var cached=sessionStorage.getItem(CK);if(cached){inject(cached);return;}}catch(e){}
    setTimeout(function(){try{pass.focus();}catch(e){}},200);
    form.addEventListener('submit',async function(ev){
      ev.preventDefault();
      var v=(pass.value||'').trim().toUpperCase();
      if(!v) return;
      err.textContent='Đang mở khóa…';
      try{
        var out=await decryptWith(v);
        try{sessionStorage.setItem(CK,out);}catch(e){}
        inject(out);
      }catch(e){
        err.textContent='Mã truy cập không đúng. Vui lòng thử lại.';
        pass.value=''; pass.focus();
      }
    });
  });
})();
</script>
