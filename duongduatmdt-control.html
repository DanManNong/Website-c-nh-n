<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0B0B">
<title>Điều khiển — Đường Đua TMĐT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0B0B0B; --graphite:#16160F; --cream:#F5EFE2; --champagne:#E8C274; --bronze:#9C6B2E;
         --green:#4ade80; --rose:#fb7185; --blue:#60a5fa; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--ink); color:var(--cream); min-height:100dvh; -webkit-font-smoothing:antialiased}
  button{font-family:inherit; cursor:pointer}
  .hidden{display:none!important}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---- gate ---- */
  .gate{min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:20px}
  .gate-card{width:100%; max-width:380px; background:rgba(22,22,15,.8); border:1px solid rgba(232,194,116,.25);
        border-radius:22px; padding:30px 26px; text-align:center}
  .gate-card .lock{font-size:2.6rem; margin-bottom:10px}
  .gate-card h1{font-size:1.25rem; font-weight:800; margin-bottom:4px}
  .gate-card p{color:rgba(245,239,226,.55); font-size:.85rem; margin-bottom:20px}
  input{width:100%; background:rgba(11,11,11,.6); border:1.5px solid rgba(232,194,116,.25); color:var(--cream);
        border-radius:13px; padding:13px 15px; font-size:1rem; font-family:inherit}
  input:focus{outline:none; border-color:var(--champagne)}
  .btn{border:none; border-radius:13px; padding:13px 18px; font-size:.98rem; font-weight:700; transition:transform .1s,opacity .15s}
  .btn:active{transform:scale(.98)} .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-gold{background:linear-gradient(135deg,#E8C274,#C9A24E); color:#1a1206}
  .btn-green{background:#16a34a; color:#fff} .btn-red{background:#dc2626; color:#fff}
  .btn-blue{background:#2563eb; color:#fff} .btn-ghost{background:rgba(245,239,226,.08); color:var(--cream); border:1px solid rgba(245,239,226,.2)}
  .btn-wide{width:100%; margin-top:16px}
  .gerr{color:#fda4af; font-size:.82rem; margin-top:12px; min-height:1em}

  /* ---- app ---- */
  .bar{position:sticky; top:0; z-index:30; background:rgba(11,11,11,.92); backdrop-filter:blur(10px);
       border-bottom:1px solid rgba(232,194,116,.18); padding:10px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .bar .brand{font-weight:800; font-size:.95rem; color:var(--champagne); white-space:nowrap}
  .badge{font-size:.72rem; font-weight:700; padding:4px 11px; border-radius:999px; white-space:nowrap}
  .b-reg{background:rgba(74,222,128,.16); color:#86efac} .b-closed{background:rgba(250,204,21,.16); color:#fde047}
  .b-cd{background:rgba(96,165,250,.16); color:#93c5fd} .b-play{background:rgba(232,194,116,.18); color:var(--champagne)}
  .b-fin{background:rgba(245,239,226,.12); color:rgba(245,239,226,.7)} .b-none{background:rgba(245,239,226,.1); color:rgba(245,239,226,.5)}
  .bar .count{font-size:.82rem; color:rgba(245,239,226,.7)} .bar .count b{color:var(--cream); font-size:1rem}
  .bar .sp{flex:1}
  .bar .mini{font-size:.78rem; padding:7px 12px; border-radius:10px}

  .controls{display:flex; gap:8px; flex-wrap:wrap; padding:12px 14px; border-bottom:1px solid rgba(232,194,116,.1); background:rgba(22,22,15,.4)}
  .controls .btn{padding:11px 16px; font-size:.9rem}
  .setup{display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; padding:14px; border-bottom:1px solid rgba(232,194,116,.1)}
  .setup .f{display:flex; flex-direction:column; gap:5px}
  .setup label{font-size:.72rem; color:rgba(245,239,226,.6); font-weight:600}
  .setup input{padding:10px 13px; font-size:.92rem}
  .setup input.prize{width:230px} .setup input.qty{width:80px}

  /* stage */
  .stage{position:relative; min-height:calc(100dvh - 56px)}
  .stage-inner{padding:18px 14px 40px; max-width:1100px; margin:0 auto}
  .fs-btn{position:absolute; top:12px; right:14px; z-index:5; background:rgba(11,11,11,.6); border:1px solid rgba(232,194,116,.3);
          color:var(--champagne); border-radius:10px; padding:7px 11px; font-size:.82rem}

  .prize-banner{text-align:center; margin-bottom:18px}
  .prize-banner .lbl{font-size:.72rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(245,239,226,.45)}
  .prize-banner .val{font-size:1.7rem; font-weight:800; background:linear-gradient(135deg,#F5EFE2,#E8C274);
        -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .qr-hint{text-align:center; font-size:.84rem; color:rgba(245,239,226,.55); margin-bottom:16px}
  .qr-hint code{background:rgba(232,194,116,.12); color:var(--champagne); padding:3px 9px; border-radius:7px; font-size:.9rem}

  .board-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px}
  .reg-layout{display:flex; gap:22px; align-items:flex-start; flex-wrap:wrap}
  .qr-panel{flex:0 0 auto; width:300px; max-width:100%; margin:0 auto; background:#fff; border-radius:22px;
            padding:22px; text-align:center; box-shadow:0 16px 44px -14px rgba(0,0,0,.6)}
  .qr-box{width:240px; height:240px; margin:0 auto; display:flex; align-items:center; justify-content:center}
  .qr-box img,.qr-box canvas{width:240px!important; height:240px!important; display:block}
  .qr-cap{color:#0B0B0B; font-weight:800; font-size:1.1rem; margin-top:14px}
  .qr-url{color:#9C6B2E; font-weight:600; font-size:.82rem; margin-top:3px; word-break:break-all}
  .board-col{flex:1; min-width:280px}
  .board-col-h{display:flex; align-items:center; justify-content:space-between; margin:2px 2px 12px}
  .board-col-h .t{font-size:.92rem; font-weight:700; color:var(--champagne)}
  .live{display:inline-flex; align-items:center; gap:6px; font-size:.72rem; color:var(--green)}
  .live .pulse{width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.5)}}
  .pcard{display:flex; align-items:center; gap:10px; background:rgba(22,22,15,.6); border:1px solid rgba(232,194,116,.15);
         border-radius:14px; padding:10px 12px; animation:pop .35s ease}
  @keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
  .pcard .av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
        font-weight:800;color:#1a1206;background:linear-gradient(135deg,#E8C274,#9C6B2E)}
  .pcard .nm{font-weight:600;font-size:.95rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard .ph{font-size:.76rem;color:rgba(245,239,226,.45);font-variant-numeric:tabular-nums}
  .empty{text-align:center;color:rgba(245,239,226,.4);padding:50px 0;font-size:.95rem}

  /* countdown */
  .cd-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:calc(100dvh - 120px);text-align:center}
  .cd-num{font-size:14rem;font-weight:800;line-height:.9;color:var(--champagne);text-shadow:0 0 60px rgba(232,194,116,.5);font-variant-numeric:tabular-nums}
  .cd-stage h2{font-size:2rem;font-weight:800}
  .cd-stage p{color:rgba(245,239,226,.6)}

  /* race */
  .race-wrap{position:relative; width:100%; height:calc(100dvh - 56px); background:#000}
  .race-wrap iframe{width:100%;height:100%;border:none;display:block}
  .mc-overlay{position:absolute; inset:0; z-index:10; background:rgba(11,11,11,.82); backdrop-filter:blur(6px);
        display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; text-align:center}
  .mc-overlay h2{font-size:1.8rem;font-weight:800;color:var(--cream)}
  .mc-overlay p{color:rgba(245,239,226,.6); max-width:340px}
  .mc-btn{background:linear-gradient(135deg,#E8C274,#C9A24E); color:#1a1206; border:none; border-radius:999px;
        padding:26px 70px; font-size:2rem; font-weight:800; box-shadow:0 20px 60px -10px rgba(232,194,116,.6);
        animation:beat 1.6s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .mc-mini{display:flex;gap:10px}

  /* winner confirm modal */
  .modal{position:fixed; inset:0; z-index:60; background:rgba(11,11,11,.85); backdrop-filter:blur(6px);
         display:flex; align-items:center; justify-content:center; padding:20px}
  .modal-card{width:100%; max-width:420px; background:var(--graphite); border:1px solid var(--champagne); border-radius:24px;
        padding:30px; text-align:center; box-shadow:0 30px 80px -10px rgba(232,194,116,.5)}
  .modal-card .pz{font-size:.78rem;color:var(--champagne);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .modal-card .big{font-size:2.6rem;margin:10px 0}
  .modal-card .wn{font-size:1.7rem;font-weight:800;margin-bottom:4px}
  .modal-card .ph{color:rgba(245,239,226,.55);font-variant-numeric:tabular-nums;margin-bottom:20px}
  .modal-card .row{display:flex;gap:10px}
  .modal-card .row .btn{flex:1;padding:13px}

  .win-list .wrow{display:flex;align-items:center;gap:12px;background:rgba(232,194,116,.07);border:1px solid rgba(232,194,116,.25);
        border-radius:14px;padding:13px 15px;margin-bottom:9px}
  .win-list .wrow .ic{font-size:1.5rem}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:80;background:var(--graphite);
        border:1px solid rgba(232,194,116,.4);color:var(--cream);padding:12px 20px;border-radius:12px;font-size:.9rem;
        opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- ============ GATE ============ -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="lock">🔐</div>
    <h1>Điều khiển Đường Đua</h1>
    <p>Khu vực dành cho nhân viên sự kiện. Nhập mật khẩu để tiếp tục.</p>
    <form id="gateForm">
      <input id="gatePass" type="password" placeholder="Mật khẩu điều khiển" autocomplete="current-password" required>
      <button class="btn btn-gold btn-wide" type="submit" id="gateBtn">Mở bảng điều khiển</button>
    </form>
    <div class="gerr" id="gateErr"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="bar">
    <span class="brand">🏁 Điều khiển</span>
    <span class="badge b-none" id="statusBadge">—</span>
    <span class="count">👥 <b id="barCount">0</b></span>
    <span class="sp"></span>
    <button class="btn btn-ghost mini" id="btnPlayerLink" title="Mở trang người chơi">🔗 Trang chơi</button>
    <button class="btn btn-ghost mini" id="btnLogout">Thoát</button>
  </div>

  <!-- setup (no active round) -->
  <div class="setup" id="setupRow">
    <div class="f"><label>Tên giải thưởng</label><input class="prize" id="inPrize" placeholder="VD: iPhone 16 Pro" maxlength="80"></div>
    <div class="f"><label>Số người trúng</label><input class="qty" id="inQty" type="number" min="1" max="20" value="1"></div>
    <button class="btn btn-green" id="btnNewRound">🔄 Tạo phiên mới / Reset</button>
  </div>

  <!-- contextual controls -->
  <div class="controls" id="controls"></div>

  <!-- stage -->
  <div class="stage" id="stage">
    <button class="fs-btn" id="fsBtn">⛶ Toàn màn hình</button>
    <div class="stage-inner" id="stageInner"></div>
  </div>
</div>

<!-- winner modal -->
<div class="modal hidden" id="winModal">
  <div class="modal-card">
    <div class="pz" id="wmPrize">GIẢI THƯỞNG</div>
    <div class="big">🏆</div>
    <div class="wn" id="wmName">—</div>
    <div class="ph" id="wmPhone">—</div>
    <div class="row">
      <button class="btn btn-ghost" id="wmCancel">↩ Quay lại</button>
      <button class="btn btn-gold" id="wmConfirm">✓ Xác nhận trúng</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/assets/supabase.min.js"></script>
<script src="/assets/qrcode.min.js"></script>
<script>
(function(){
  'use strict';
  const SB_URL='https://dcmtbgcltopnqsiedwlg.supabase.co';
  const SB_KEY='sb_publishable_goPNlFYvQUspbFSvDzkN3w_KMapxvUq';
  let sb=null; try{ sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}}); }catch(e){ console.error(e); }

  const $=id=>document.getElementById(id);
  const TOKEN_KEY='dd_ctrl_token';
  const CD_TOTAL=15;
  const PLAYER_URL='https://nguyentanphong.com/duongduatmdt';
  let token=sessionStorage.getItem(TOKEN_KEY)||null;

  let st={ roundId:null, status:null, prize:null, qty:1, countdownAt:null, skew:0, count:0 };
  let players=[];           // [{id,name,phone}]
  let codeMap={};           // code -> player
  let iframeReady=false;
  let mcStarted=false;      // MC pressed BẮT ĐẦU this round
  let recordedWinners=0;
  let pendingWin=null;
  let curStageMode=null;

  function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  function initials(n){const p=(n||'').trim().split(/\s+/);return (p[p.length-1]||'?').slice(0,1).toUpperCase();}
  function mask(phone){return 'xxx'+String(phone||'').replace(/\D/g,'').slice(-3);}
  let toastT=null;
  function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

  async function rpc(fn,args){ if(!sb)return null; const{data,error}=await sb.rpc(fn,args||{}); if(error){console.warn(fn,error.message);return {ok:false,error:error.message};} return data; }

  // ---------- AUTH ----------
  $('gateForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const pass=$('gatePass').value; const btn=$('gateBtn'); const err=$('gateErr'); err.textContent='';
    btn.disabled=true; const old=btn.textContent; btn.innerHTML='<span class="spin"></span>Đang kiểm tra…';
    const res=await rpc('dd_admin_login',{p_token:pass});
    btn.disabled=false; btn.textContent=old;
    if(res&&res.ok){ token=pass; sessionStorage.setItem(TOKEN_KEY,pass); openApp(); }
    else { err.textContent='Mật khẩu không đúng.'; }
  });
  $('btnLogout').addEventListener('click',function(){ sessionStorage.removeItem(TOKEN_KEY); token=null; location.reload(); });

  function openApp(){ $('gate').classList.add('hidden'); $('app').classList.remove('hidden'); poll(); }

  // ---------- SETUP / CONTROLS ----------
  $('btnNewRound').addEventListener('click', async function(){
    const prize=$('inPrize').value.trim();
    const qty=Math.max(1,parseInt($('inQty').value,10)||1);
    if(!prize){ toast('Nhập tên giải thưởng trước'); return; }
    if(st.roundId && !confirm('Tạo phiên MỚI sẽ kết thúc phiên hiện tại và xoá danh sách người chơi khỏi màn hình. Tiếp tục?')) return;
    const res=await rpc('dd_admin_new_round',{p_token:token,p_prize:prize});
    if(res&&res.ok){ st.qty=qty; sessionStorage.setItem('dd_qty',String(qty)); mcStarted=false; recordedWinners=0; toast('Đã mở phiên mới — đăng ký đang mở'); poll(); }
    else { toast((res&&res.error)||'Lỗi tạo phiên'); }
  });
  $('btnPlayerLink').addEventListener('click',function(){ window.open('/duongduatmdt','_blank','noopener'); });
  $('fsBtn').addEventListener('click',function(){ const el=$('stage'); if(!document.fullscreenElement) el.requestFullscreen&&el.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); });

  async function setStatus(s){ const res=await rpc('dd_admin_set_status',{p_token:token,p_round:st.roundId,p_status:s}); if(!(res&&res.ok)) toast((res&&res.error)||'Lỗi đổi trạng thái'); return res&&res.ok; }

  function renderControls(){
    const c=$('controls'); const s=st.status;
    let h='';
    $('setupRow').classList.remove('hidden');  // luôn hiện nút tạo/reset phiên
    if(!st.roundId){ c.innerHTML=''; return; }
    if(s==='registration'){
      h+=btn('btnClose','btn-ghost','🔒 Đóng đăng ký');
      h+=btn('btnStart','btn-blue','▶ Bắt đầu (đếm ngược 15s)');
    } else if(s==='closed'){
      h+=btn('btnReopen','btn-ghost','🔓 Mở lại đăng ký');
      h+=btn('btnStart','btn-blue','▶ Bắt đầu (đếm ngược 15s)');
    } else if(s==='countdown'){
      h+=btn('btnBack','btn-ghost','↩ Về đăng ký');
      h+=btn('btnSkip','btn-ghost','⏭ Bỏ qua đếm ngược');
    } else if(s==='playing'){
      h+=btn('btnDrawNext','btn-gold','🔄 Quay tiếp');
      h+=btn('btnFinish','btn-red','⏹ Kết thúc');
    } else if(s==='finished'){
      h+=btn('btnAgain','btn-green','🔄 Phiên mới');
    }
    c.innerHTML=h;
    bind('btnClose',()=>setStatus('closed').then(poll));
    bind('btnReopen',()=>setStatus('registration').then(poll));
    bind('btnStart',startCountdown);
    bind('btnBack',()=>{mcStarted=false;setStatus('registration').then(poll);});
    bind('btnSkip',()=>{ st.countdownAt=Date.now()-CD_TOTAL*1000-state0; showRaceStage(); });
    bind('btnDrawNext',()=>{ if(iframeReady) iframe().postMessage({type:'START_RACE'},'*'); });
    bind('btnFinish',()=>setStatus('finished').then(poll));
    bind('btnAgain',()=>{ st.roundId=null; st.status=null; players=[]; codeMap={}; $('inPrize').value=''; $('inQty').value=st.qty||1; renderControls(); poll(); });
  }
  let state0=0;
  function btn(id,cls,label){ return '<button class="btn '+cls+'" id="'+id+'">'+label+'</button>'; }
  function bind(id,fn){ const el=$(id); if(el) el.addEventListener('click',fn); }

  async function startCountdown(){
    // snapshot players first
    await refreshPlayers();
    mcStarted=false;
    const ok=await setStatus('countdown');
    if(ok){ poll(); }
  }

  // ---------- STAGE RENDER ----------
  function setStageMode(mode){
    if(curStageMode===mode && mode!=='finished') return; // mỗi mode render shell một lần
    curStageMode=mode;
    const inner=$('stageInner');
    if(mode==='board'){ inner.innerHTML = boardHTML(); renderQR(); renderBoardGrid(); }
    else if(mode==='countdown'){ inner.innerHTML = countdownHTML(); }
    else if(mode==='race'){ inner.innerHTML = raceHTML(); attachRace(); }
    else if(mode==='finished'){ inner.innerHTML = '<div id="winBox"></div>'; refreshWinners(); }
    else if(mode==='none'){ inner.innerHTML = '<div class="empty">Chưa có phiên chơi. Tạo "Mở phiên mới" ở trên để bắt đầu.</div>'; }
  }

  function boardHTML(){
    const pz=st.prize||'Giải thưởng';
    return ''+
      '<div class="prize-banner"><div class="lbl">Giải thưởng</div><div class="val">🎁 '+esc(pz)+(st.qty>1?(' ×'+st.qty):'')+'</div></div>'+
      '<div class="reg-layout">'+
        '<div class="qr-panel"><div class="qr-box" id="qrBox"></div><div class="qr-cap">📲 Quét mã để tham gia</div><div class="qr-url">nguyentanphong.com/duongduatmdt</div></div>'+
        '<div class="board-col"><div class="board-col-h"><span class="t">Người chơi đã tham gia</span><span class="live"><span class="pulse"></span>TRỰC TIẾP</span></div><div class="board-grid" id="boardGrid"></div></div>'+
      '</div>';
  }
  function renderQR(){
    const box=$('qrBox'); if(!box || typeof QRCode==='undefined') return;
    box.innerHTML='';
    try{ new QRCode(box,{text:PLAYER_URL,width:240,height:240,colorDark:'#0B0B0B',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M}); }
    catch(e){ box.innerHTML='<div style="color:#0B0B0B;font-weight:700;font-size:.8rem;word-break:break-all">'+PLAYER_URL+'</div>'; }
  }
  function countdownHTML(){
    return '<div class="cd-stage"><div style="letter-spacing:.2em;color:var(--champagne);font-size:.9rem">SẮP XUẤT PHÁT</div>'+
      '<div class="cd-num" id="cdBig">15</div><h2>Sẵn sàng!</h2><p>Mời các thí sinh chú ý lên màn hình.</p></div>';
  }
  function raceHTML(){
    return '<div class="race-wrap">'+
      '<iframe id="raceFrame" src="/duong-dua-tmdt.html?embedded=1" title="Đường đua"></iframe>'+
      '<div class="mc-overlay" id="mcOverlay"><h2>🎤 Sẵn sàng cho MC</h2>'+
      '<p>Khi MC hô hiệu lệnh, bấm nút bên dưới để xuất phát.</p>'+
      '<button class="mc-btn" id="mcStartBtn">BẮT ĐẦU</button>'+
      '<div class="mc-mini"></div></div></div>';
  }

  function iframe(){ const f=$('raceFrame'); return f&&f.contentWindow; }
  function attachRace(){
    iframeReady=false;
    const f=$('raceFrame');
    if(f){ f.addEventListener('load',function(){ setTimeout(()=>{ try{iframe().postMessage({type:'PING'},'*');}catch(e){} },400); }); }
    const mc=$('mcStartBtn');
    if(mc) mc.addEventListener('click', async function(){
      mcStarted=true;
      $('mcOverlay')&&$('mcOverlay').classList.add('hidden');
      await setStatus('playing');
      sendParticipants();
      if(iframeReady) iframe().postMessage({type:'START_RACE'},'*');
      poll();
    });
  }

  function sendParticipants(){
    if(!iframeReady) return;
    const list=players.map(function(p,i){
      const code=String(i+1).padStart(2,'0');
      return {code:code, name:p.name, avatar:null};
    });
    iframe().postMessage({ type:'SET_PARTICIPANTS', participants:list, prize:(st.prize||'Giải thưởng'), prizeQty:(st.qty||1) }, '*');
  }

  // ---------- DATA ----------
  async function refreshPlayers(){
    if(!st.roundId) return;
    const rows=await rpc('dd_admin_players',{p_token:token,p_round:st.roundId});
    if(Array.isArray(rows)){
      players=rows.map(r=>({id:r.id,name:r.name,phone:r.phone}));
      codeMap={}; players.forEach((p,i)=>{ codeMap[String(i+1).padStart(2,'0')]=p; });
      st.count=players.length;
    }
  }
  function renderBoardGrid(){
    const g=$('boardGrid'); if(!g) return;
    const sig=players.map(p=>p.id).join(',');
    if(g.dataset.sig===sig) return;   // chỉ vẽ lại khi danh sách đổi → không nháy
    g.dataset.sig=sig;
    if(!players.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1">Chưa có ai đăng ký. Mời quét QR để tham gia!</div>'; return; }
    g.innerHTML=players.map(p=>'<div class="pcard"><div class="av">'+esc(initials(p.name))+'</div>'+
      '<div class="nm">'+esc(p.name)+'</div><div class="ph">'+esc(mask(p.phone))+'</div></div>').join('');
  }
  async function refreshWinners(){
    if(!st.roundId) return;
    const rows=await rpc('dd_winners_list',{p_round:st.roundId});
    const box=$('winBox'); if(!box) return;
    const pz=st.prize?('🎁 '+esc(st.prize)):'';
    let h='<div class="prize-banner"><div class="lbl">Kết quả</div><div class="val">🏆 Người trúng giải</div></div>';
    if(!rows||!rows.length){ h+='<div class="empty">Chưa ghi nhận người trúng.</div>'; }
    else { h+='<div class="win-list" style="max-width:560px;margin:0 auto">'+rows.map(w=>
      '<div class="wrow"><div class="ic">🏆</div><div style="flex:1;min-width:0"><div style="font-size:.74rem;color:var(--champagne);font-weight:700;text-transform:uppercase">'+esc(w.prize)+'</div>'+
      '<div style="font-size:1.1rem;font-weight:700">'+esc(w.name)+' <span style="color:rgba(245,239,226,.45);font-size:.85rem;font-weight:500">'+esc(w.phone_masked)+'</span></div></div></div>'
    ).join('')+'</div>'; }
    box.innerHTML=h;
  }

  // ---------- WINNER FROM IFRAME ----------
  window.addEventListener('message', function(e){
    const d=e.data; if(!d||!d.type) return;
    if(d.type==='IFRAME_READY'){ iframeReady=true; sendParticipants(); return; }
    if(d.type==='RACE_WINNER'){
      const p=codeMap[d.code];
      pendingWin={ name:(p?p.name:d.name), phone:(p?p.phone:''), prize:(st.prize||d.prize||'Giải thưởng') };
      $('wmPrize').textContent=pendingWin.prize;
      $('wmName').textContent=pendingWin.name;
      $('wmPhone').textContent=pendingWin.phone?('SĐT: '+pendingWin.phone):'';
      $('winModal').classList.remove('hidden');
      return;
    }
  });
  $('wmCancel').addEventListener('click',function(){ pendingWin=null; $('winModal').classList.add('hidden'); });
  $('wmConfirm').addEventListener('click', async function(){
    if(!pendingWin) return;
    const btn=$('wmConfirm'); btn.disabled=true;
    const res=await rpc('dd_admin_add_winner',{p_token:token,p_round:st.roundId,p_name:pendingWin.name,p_phone:pendingWin.phone,p_prize:pendingWin.prize,p_position:recordedWinners+1});
    btn.disabled=false;
    if(res&&res.ok){ recordedWinners++; toast('Đã ghi nhận người trúng: '+pendingWin.name); }
    else { toast((res&&res.error)||'Lỗi ghi nhận'); }
    pendingWin=null; $('winModal').classList.add('hidden');
  });

  // ---------- COUNTDOWN TICK ----------
  function showRaceStage(){ if(st.status==='countdown'){ setStageMode('race'); } }
  setInterval(function(){
    if(st.status!=='countdown'||!st.countdownAt) return;
    const nowS=Date.now()+st.skew;
    let remain=CD_TOTAL-(nowS-st.countdownAt)/1000; if(remain<0)remain=0;
    if(curStageMode==='countdown'){ const el=$('cdBig'); if(el) el.textContent=Math.ceil(remain); }
    if(remain<=0 && curStageMode==='countdown'){ setStageMode('race'); }
  },150);

  // ---------- MAIN POLL ----------
  async function poll(){
    if(!token) return;
    const rows=await rpc('dd_active_round');
    const r=Array.isArray(rows)?rows[0]:null;
    if(!r){
      st.roundId=null; st.status=null; st.count=0;
      $('statusBadge').className='badge b-none'; $('statusBadge').textContent='Chưa có phiên';
      $('barCount').textContent='0';
      $('setupRow').classList.remove('hidden'); $('controls').innerHTML='';
      setStageMode('none'); curStageMode='none';
      return;
    }
    if(r.server_now) st.skew=new Date(r.server_now).getTime()-Date.now();
    const changedRound = st.roundId!==r.id;
    const changedStatus = st.status!==r.status;
    st.roundId=r.id; st.status=r.status; st.prize=r.prize;
    st.countdownAt=r.countdown_at?new Date(r.countdown_at).getTime():null;
    st.count=r.player_count||0;
    // restore qty for this round if stored
    const sq=parseInt(sessionStorage.getItem('dd_qty')||'',10); if(sq) st.qty=sq;

    // bar
    const badges={registration:['b-reg','🔓 Đang mở đăng ký'],closed:['b-closed','🔒 Đã đóng đăng ký'],
      countdown:['b-cd','⏳ Đếm ngược'],playing:['b-play','🏁 Đang đua'],finished:['b-fin','✅ Kết thúc']};
    const bd=badges[r.status]||['b-none','—'];
    $('statusBadge').className='badge '+bd[0]; $('statusBadge').textContent=bd[1];
    $('barCount').textContent=st.count;

    if(changedRound||changedStatus) renderControls();

    // stage by status
    if(r.status==='registration'||r.status==='closed'){
      await refreshPlayers(); setStageMode('board'); renderBoardGrid();
    } else if(r.status==='countdown'){
      if(curStageMode!=='race') setStageMode('countdown');
    } else if(r.status==='playing'){
      if(curStageMode!=='race'){ await refreshPlayers(); setStageMode('race'); }
      else if(iframeReady) sendParticipants();
    } else if(r.status==='finished'){
      setStageMode('finished'); refreshWinners();
    }
  }

  // boot
  if(token){ openApp(); } else { $('gatePass').focus(); }
  setInterval(poll, 2200);
  setInterval(function(){ if(st.status==='registration'||st.status==='closed'){ refreshPlayers().then(renderBoardGrid); } }, 2600);
})();
</script>
</body>
</html>
