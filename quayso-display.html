<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0B0B">
<title>Quay Số — Đường Đua TMĐT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0B0B0B; --graphite:#16160F; --cream:#F5EFE2; --champagne:#E8C274; --bronze:#9C6B2E; --green:#4ade80; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--ink); color:var(--cream); overflow:hidden; height:100vh}
  .hidden{display:none!important}
  .glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
  .glow.a{top:-160px;left:-140px;width:480px;height:480px;background:rgba(232,194,116,.12)}
  .glow.b{bottom:-180px;right:-140px;width:480px;height:480px;background:rgba(156,107,46,.22)}
  #root{position:relative;z-index:1;height:100vh;width:100vw}
  #topName{position:fixed;top:0;left:0;right:0;z-index:40;text-align:center;pointer-events:none;padding:1vh 0;font-weight:900;font-size:1.5vw;letter-spacing:.06em;color:var(--champagne);background:linear-gradient(180deg,rgba(11,11,11,.7),rgba(11,11,11,0));text-shadow:0 2px 8px rgba(0,0,0,.6)}
  #topName span{color:rgba(245,239,226,.5);font-weight:700;font-size:.7em}
  #ctrlBar{position:fixed;bottom:0;left:0;right:0;z-index:45;display:flex;gap:1vw;justify-content:center;padding:1.4vh 2vw calc(1.4vh + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(11,11,11,.85),rgba(11,11,11,0))}
  #ctrlBar button{border:none;border-radius:14px;padding:1.4vh 3vw;font-size:1.5vw;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:.6vw;transition:transform .1s}
  #ctrlBar button:active{transform:scale(.97)}
  #ctrlBar .b-next{background:linear-gradient(135deg,#E8C274,#C9A24E);color:#1a1206}
  #ctrlBar .b-finish{background:#b91c1c;color:#fff}

  .center{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:40px}
  .center .flag{font-size:7rem;line-height:1}
  .center h1{font-size:min(4.6vw,8vh);font-weight:900;white-space:nowrap;background:linear-gradient(180deg,#fff,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .center .subt{font-size:1.7vw;font-weight:700;color:var(--champagne);opacity:.85}
  .center p{color:rgba(245,239,226,.6);font-size:1.2rem}

  .hero{text-align:center;padding:1.6vh 2vw .6vh;overflow:hidden;max-width:100vw}
  .hero .flag{font-size:4.4vh;line-height:1}
  .hero .slogan{white-space:nowrap;font-weight:900;font-size:min(4vw,7vh);letter-spacing:-.02em;margin-top:.3vh;background:linear-gradient(180deg,#fff,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero .title{white-space:nowrap;font-weight:700;font-size:1.7vw;color:var(--champagne);margin-top:.2vh;letter-spacing:.06em;opacity:.85}

  .reg{height:100vh;display:flex;flex-direction:column;padding:1vh 3vw 2vh}
  .prize-row{display:flex;flex-wrap:wrap;gap:.7vw;justify-content:center;margin:1vh 0}
  .pchip{background:rgba(232,194,116,.12);border:1px solid rgba(232,194,116,.3);color:var(--champagne);border-radius:999px;padding:.7vh 1.4vw;font-size:1.5vw;font-weight:700;white-space:nowrap}
  .status{display:block;text-align:center;font-size:1.2vw;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.6vh}
  .st-open{color:#86efac} .st-closed{color:#fde047}
  .reg-body{flex:1;display:flex;gap:3vw;min-height:0}
  .qr-side{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .qr-card{background:#fff;border-radius:26px;padding:22px;box-shadow:0 24px 70px -16px rgba(0,0,0,.7)}
  .qr-card .qr-box{width:min(32vh,340px);height:min(32vh,340px);display:flex;align-items:center;justify-content:center}
  .qr-card .qr-box img,.qr-card .qr-box canvas{width:100%!important;height:100%!important}
  .qr-side .cap{font-size:1.7vw;font-weight:800;color:var(--champagne)}
  .qr-side .url{font-size:1vw;color:rgba(245,239,226,.6)}
  .qr-side .qstart{margin-top:6px;border:none;border-radius:16px;padding:1.6vh 3.5vw;font-size:2vw;font-weight:900;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,#E8C274,#C9A24E);color:#1a1206;box-shadow:0 14px 40px -10px rgba(232,194,116,.6)}
  .qr-side .qstart:active{transform:scale(.97)}
  .board-side{flex:1;display:flex;flex-direction:column;min-width:0;background:rgba(22,22,15,.5);border:1px solid rgba(232,194,116,.18);border-radius:24px;padding:1.6vh 1.4vw}
  .board-side .bh .t{font-size:1.4vw;font-weight:800;color:var(--champagne)}
  .pgrid{flex:1;overflow:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(15vw,1fr));grid-auto-rows:min-content;gap:.7vh .8vw;align-content:start;margin-top:1vh}
  .pchip2{display:flex;align-items:center;gap:8px;background:rgba(11,11,11,.5);border:1px solid rgba(232,194,116,.14);border-radius:12px;padding:.6vh .8vw}
  .pchip2 .em{font-size:1.9vw;line-height:1;flex-shrink:0}
  .pchip2 .nm{font-weight:600;font-size:1.05vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .pchip2 .ph{font-size:.85vw;color:rgba(245,239,226,.45)}
  .pempty{grid-column:1/-1;text-align:center;color:rgba(245,239,226,.4);font-size:1.4vw;padding:6vh 0}

  #cdOverlay{position:absolute;inset:0;z-index:20;background:rgba(11,11,11,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5vh}
  #cdOverlay .pz{font-size:2.4vw;font-weight:900;color:var(--champagne)}
  #cdOverlay .lbl{font-size:1.6vw;letter-spacing:.3em;color:rgba(245,239,226,.6);text-transform:uppercase}
  #cdOverlay .num{font-size:40vh;font-weight:900;line-height:.85;color:var(--champagne);text-shadow:0 0 80px rgba(232,194,116,.6)}

  /* spin stage */
  .spin{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vh;text-align:center}
  .spin .pz{font-size:2.4vw;font-weight:900;color:var(--champagne)}
  .reelCard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1vh;
    width:min(70vw,900px);padding:5vh 4vw;border-radius:36px;background:rgba(22,22,15,.85);
    border:2px solid rgba(232,194,116,.4);box-shadow:0 30px 100px -20px rgba(0,0,0,.8);transition:transform .2s}
  .reelCard .em{font-size:18vh;line-height:1}
  .reelCard .nm{font-size:6vw;font-weight:900;line-height:1.05;background:linear-gradient(180deg,#fff,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64vw}
  .reelCard .ph{font-size:2.4vw;color:rgba(245,239,226,.55);font-variant-numeric:tabular-nums;letter-spacing:.04em}
  .reelCard.spinning{filter:blur(1px)}
  .reelCard.win{border-color:var(--champagne);box-shadow:0 0 0 6px rgba(232,194,116,.25),0 30px 120px -10px rgba(232,194,116,.6);animation:winpop .6s cubic-bezier(.175,.885,.32,1.275)}
  @keyframes winpop{0%{transform:scale(.8)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  .spin .hint{font-size:1.6vw;color:rgba(245,239,226,.5);font-weight:700;letter-spacing:.1em}

  .fin{height:100vh;display:flex;flex-direction:column;align-items:center;padding:3vh 3vw;overflow:hidden}
  .fin .flag{font-size:5vh}
  .fin h1{font-size:2.8vw;font-weight:900;margin:.6vh 0 2vh}
  .fin .wlist{width:min(960px,92vw);display:flex;flex-direction:column;gap:1.2vh;overflow:hidden}
  .wcard{display:flex;align-items:center;gap:1.4vw;background:rgba(232,194,116,.08);border:1px solid rgba(232,194,116,.3);border-radius:18px;padding:1.4vh 1.6vw}
  .wcard .ic{font-size:2.4vw}
  .wcard .pz{font-size:1vw;color:var(--champagne);font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .wcard .nm{font-size:1.9vw;font-weight:900}
  .wcard .ph{font-size:1.1vw;color:rgba(245,239,226,.5);font-weight:600}

  .confetti{position:fixed;inset:0;z-index:30;pointer-events:none;overflow:hidden}
  .cf{position:absolute;top:-20px;width:12px;height:12px;border-radius:2px;animation:cfall 2.6s ease-in forwards}
  @keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(105vh) rotate(720deg)}}
</style>
</head>
<body>
<div class="glow a"></div><div class="glow b"></div>
<div id="root"></div>
<div id="topName">🎰 TĂNG TRƯỞNG THẦN TỐC <span>· Quay số trúng thưởng</span></div>
<div id="ctrlBar" class="hidden"></div>
<div class="confetti hidden" id="confetti"></div>

<script src="/assets/supabase.min.js"></script>
<script src="/assets/qrcode.min.js"></script>
<script>
(function(){
  'use strict';
  const SB_URL='https://dcmtbgcltopnqsiedwlg.supabase.co';
  const SB_KEY='sb_publishable_goPNlFYvQUspbFSvDzkN3w_KMapxvUq';
  const PLAYER_URL='https://nguyentanphong.com/duongduatmdt';
  const CD_TOTAL=15;
  const ZOO=['🦁','🐱','🐰','🐻','🦊','🐼','🦉','🐧','🦆','🐸','🦄','🐶','🐘','🐯','🐵','🐬','🐴','🦌','🐨','🐹','🐢','🐳','🦅','🐷'];
  const animal=i=>ZOO[((i%24)+24)%24];
  let sb=null; try{ sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}}); }catch(e){ console.error(e); }

  let token=null;
  try{ const m=(location.hash||'').match(/t=([^&]+)/); if(m){ token=decodeURIComponent(m[1]); history.replaceState(null,'',location.pathname+location.search); } }catch(_e){}

  const $=id=>document.getElementById(id);
  const root=$('root');
  function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  function mask(p){return 'xxx'+String(p||'').replace(/\D/g,'').slice(-3);}
  function parsePrizes(p){ if(!p) return [{name:'Giải thưởng',quantity:1}]; try{ const a=JSON.parse(p); if(Array.isArray(a)&&a.length) return a.map(x=>({name:String(x.name||'Giải'),quantity:Math.max(1,parseInt(x.quantity,10)||1)})); }catch(e){} return [{name:p,quantity:1}]; }
  async function rpc(fn,args){ if(!sb)return null; const{data,error}=await sb.rpc(fn,args||{}); if(error){console.warn(fn,error.message);return null;} return data; }
  async function setStatus(s){ if(!token||!st.roundId) return; await rpc('dd_admin_set_status',{p_token:token,p_round:st.roundId,p_status:s}); poll(); }

  let st={ roundId:null, status:null, prizes:[{name:'Giải thưởng',quantity:1}], countdownAt:null, skew:0, count:0, winCount:0 };
  let players=[], mode=null, drawSignal=null, drawStarted=false, spinning=false, wonSet=new Set(), qrDone=false, lastCtrlKey=null;

  function totalSlots(){ return st.prizes.reduce((s,p)=>s+p.quantity,0); }
  function effWin(){ return Math.max(st.winCount, wonSet.size); }
  function currentGroup(){ let acc=0; const w=effWin(); for(let i=0;i<st.prizes.length;i++){ const p=st.prizes[i]; if(w<acc+p.quantity) return {name:p.name,quantity:p.quantity,slot:(w-acc)+1}; acc+=p.quantity; } return null; }
  function playerIndex(p){ for(let i=0;i<players.length;i++){ if(players[i].id===p.id) return i; } return 0; }
  function animalForPlayer(p){ return animal(playerIndex(p)); }

  // ---------- audio ----------
  let actx=null; function ac(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} return actx; }
  function beep(f,d,v,type){ const c=ac(); if(!c)return; try{ const o=c.createOscillator(),g=c.createGain(); o.type=type||'sine'; o.frequency.value=f; g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(d||0.1)); o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+(d||0.1)); }catch(e){} }
  function tick(){ beep(420,0.04,0.03,'square'); }
  function fanfare(){ [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.3,0.09,'sine'),i*130)); }

  function confetti(){
    const box=$('confetti'); box.classList.remove('hidden'); box.innerHTML='';
    const cols=['#E8C274','#C9A24E','#fff','#4ade80','#fb7185','#60a5fa'];
    for(let i=0;i<80;i++){ const d=document.createElement('div'); d.className='cf'; d.style.left=Math.random()*100+'%'; d.style.background=cols[i%cols.length]; d.style.animationDelay=(Math.random()*0.5)+'s'; box.appendChild(d); }
    setTimeout(()=>{ box.classList.add('hidden'); box.innerHTML=''; }, 3200);
  }

  // ---------- render ----------
  const HERO='<div class="hero"><div class="flag">🎰</div><div class="slogan">Tăng trưởng thần tốc</div><div class="title">Quay số trúng thưởng</div></div>';
  function setMode(m){
    if(mode===m) return false;
    mode=m;
    var tn=$('topName'); if(tn) tn.style.display=(m==='countdown'||m==='spin')?'block':'none';
    if(m==='idle'){
      root.innerHTML='<div class="center"><div class="flag">🎰</div><h1>Tăng trưởng thần tốc</h1><div class="subt">Quay số trúng thưởng</div><p>Đang chờ ban tổ chức mở phiên…</p></div>';
    } else if(m==='reg'){
      root.innerHTML='<div class="reg">'+HERO+
        '<span class="status" id="dStatus"></span>'+
        '<div class="prize-row" id="prizeRow"></div>'+
        '<div class="reg-body">'+
          '<div class="qr-side"><div class="qr-card"><div class="qr-box" id="qrBox"></div></div><div class="cap">📲 Quét mã để tham gia</div><div class="url">nguyentanphong.com/duongduatmdt</div><div id="qrStart"></div></div>'+
          '<div class="board-side"><div class="bh"><span class="t">Người chơi đã tham gia</span></div><div class="pgrid" id="pgrid"></div></div>'+
        '</div></div>';
      qrDone=false; renderQR();
    } else if(m==='countdown'){
      root.innerHTML='<div id="cdOverlay"><div class="pz" id="cdPrize"></div><div class="lbl">Sắp quay số</div><div class="num" id="cdNum">15</div></div>';
    } else if(m==='spin'){
      root.innerHTML='<div class="spin"><div class="pz" id="spinPz"></div>'+
        '<div class="reelCard" id="reelCard"><div class="em" id="reelEm">🎲</div><div class="nm" id="reelName">…</div><div class="ph" id="reelPhone"></div></div>'+
        '<div class="hint" id="spinHint">Đang quay…</div></div>';
    } else if(m==='finished'){
      root.innerHTML='<div class="fin"><div class="flag">🏆</div><h1>Người trúng giải</h1><div class="wlist" id="wlist"></div></div>';
      refreshWinners();
    }
    return true;
  }
  function renderQR(){ const box=$('qrBox'); if(!box||qrDone||typeof QRCode==='undefined')return; box.innerHTML=''; try{ new QRCode(box,{text:PLAYER_URL,width:340,height:340,colorDark:'#0B0B0B',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M}); qrDone=true; }catch(e){} }

  function renderCtrl(){
    const bar=$('ctrlBar');
    if(!token){ bar.classList.add('hidden'); bar.innerHTML=''; lastCtrlKey='notoken'; return; }
    const s=st.status;
    if(s==='registration'||s==='closed'){
      bar.classList.add('hidden'); bar.innerHTML='';
      const qs=$('qrStart'); if(qs && qs.dataset.k!=='start'){ qs.dataset.k='start'; qs.innerHTML='<button class="qstart">🎰 BẮT ĐẦU QUAY</button>'; qs.querySelector('button').addEventListener('click',()=>setStatus('countdown')); }
      lastCtrlKey='reg'; return;
    }
    if(!st.roundId || s==='finished'){ if(lastCtrlKey!=='hide'){ bar.classList.add('hidden'); bar.innerHTML=''; lastCtrlKey='hide'; } return; }
    const more=effWin()<totalSlots();
    const key=s+'|'+more+'|'+spinning; if(key===lastCtrlKey) return; lastCtrlKey=key;
    let h='';
    if(s==='countdown'){ h='<button class="b-finish" data-a="finished">⏹ Kết thúc</button>'; }
    else if(s==='spinst' || s==='playing'){ if(more && !spinning) h+='<button class="b-next" data-a="countdown">🎰 QUAY TIẾP</button>'; h+='<button class="b-finish" data-a="finished">⏹ Kết thúc</button>'; }
    bar.innerHTML=h; bar.classList.remove('hidden');
    bar.querySelectorAll('button').forEach(b=>b.addEventListener('click',function(){ const a=this.dataset.a; if(a==='finished' && !confirm('Kết thúc game?')) return; setStatus(a); }));
  }

  async function refreshBoardPublic(){
    if(!st.roundId) return;
    const rows=await rpc('dd_board',{p_round:st.roundId});
    const g=$('pgrid'); if(!g) return;
    if(!rows||!rows.length){ g.innerHTML='<div class="pempty">Chưa có ai. Hãy là người đầu tiên quét mã! 🎯</div>'; return; }
    const sig=rows.map(r=>r.phone_masked+r.name).join('|'); if(g.dataset.sig===sig) return; g.dataset.sig=sig;
    g.innerHTML=rows.map((r,i)=>'<div class="pchip2"><span class="em">'+animal(i)+'</span><div class="nm">'+esc(r.name)+'</div><div class="ph">'+esc(r.phone_masked)+'</div></div>').join('');
  }
  async function refreshPlayersAdmin(){
    if(!st.roundId || !token) return;
    const rows=await rpc('dd_admin_players',{p_token:token,p_round:st.roundId});
    if(Array.isArray(rows)) players=rows.map(r=>({id:r.id,name:r.name,phone:r.phone}));
  }
  async function refreshWinners(){
    if(!st.roundId) return;
    const rows=await rpc('dd_winners_list',{p_round:st.roundId});
    st.winCount=Array.isArray(rows)?rows.length:st.winCount;
    rebuildWon(rows);
    const box=$('wlist'); if(!box) return;
    if(!rows||!rows.length){ box.innerHTML='<div class="pempty">Chưa có người trúng.</div>'; return; }
    box.innerHTML=rows.map(w=>'<div class="wcard"><div class="ic">🏆</div><div style="flex:1;min-width:0"><div class="pz">'+esc(w.prize)+'</div><div class="nm">'+esc(w.name)+' <span class="ph">'+esc(w.phone_masked)+'</span></div></div></div>').join('');
  }
  async function fetchWinners(){ if(!st.roundId) return; const rows=await rpc('dd_winners_list',{p_round:st.roundId}); if(Array.isArray(rows)){ st.winCount=rows.length; rebuildWon(rows); } }
  function rebuildWon(winners){
    const ws=new Set();
    (winners||[]).forEach(w=>{ const last3=String(w.phone_masked||'').slice(-3); const p=players.find(x=>x.name===w.name && String(x.phone).slice(-3)===last3 && !ws.has(x.id)); if(p) ws.add(p.id); });
    if(ws.size>=wonSet.size) wonSet=ws; // tránh tụt khi chưa kịp đồng bộ
  }

  // ---------- spin ----------
  function setReel(p, final){
    const em=$('reelEm'), nm=$('reelName'), ph=$('reelPhone'), card=$('reelCard');
    if(!em) return;
    em.textContent=animalForPlayer(p); nm.textContent=p.name; ph.textContent=mask(p.phone);
    if(card){ card.classList.toggle('win',!!final); card.classList.toggle('spinning',!final); }
  }
  function startSpin(){
    if(spinning) return;
    const elig=players.filter(p=>!wonSet.has(p.id));
    const g=currentGroup();
    if(!elig.length || !g){ const h=$('spinHint'); if(h) h.textContent='Đã quay đủ giải.'; return; }
    spinning=true;
    const pz=$('spinPz'); if(pz) pz.textContent='🎁 '+g.name+(g.quantity>1?(' ('+g.slot+'/'+g.quantity+')'):'');
    const hint=$('spinHint'); if(hint) hint.textContent='Đang quay…';
    const winner=elig[Math.floor(Math.random()*elig.length)];
    const start=Date.now(); const DUR=4200;
    try{ ac(); }catch(e){}
    function frame(){
      const t=(Date.now()-start)/DUR;
      if(t>=1){
        setReel(winner,true);
        if(hint) hint.textContent='🎉 Chúc mừng!';
        confetti(); fanfare();
        recordWinner(winner);
        spinning=false; lastCtrlKey=null; renderCtrl();
        return;
      }
      setReel(players[Math.floor(Math.random()*players.length)], false);
      if(t>0.55) tick();
      const delay=45 + Math.pow(t,2.7)*560;
      setTimeout(frame, delay);
    }
    frame();
  }
  function recordWinner(p){
    wonSet.add(p.id);
    const g=currentGroup()||{name:(st.prizes[0]&&st.prizes[0].name)||'Giải thưởng'};
    if(token) rpc('dd_admin_add_winner',{p_token:token,p_round:st.roundId,p_name:p.name,p_phone:p.phone,p_prize:g.name,p_position:wonSet.size});
  }

  // ---------- countdown tick ----------
  setInterval(function(){
    if(mode!=='countdown'||!st.countdownAt) return;
    const nowS=Date.now()+st.skew;
    let remain=CD_TOTAL-(nowS-st.countdownAt)/1000; if(remain<0)remain=0;
    const el=$('cdNum'); if(el) el.textContent=Math.ceil(remain);
    const pz=$('cdPrize'); if(pz){ const g=currentGroup(); pz.textContent=g?('🎁 '+g.name+(g.quantity>1?(' ('+g.slot+'/'+g.quantity+')'):'')):'🎁 Giải thưởng'; }
    if(remain<=0 && !drawStarted){
      drawStarted=true;
      if(token){ rpc('dd_admin_set_status',{p_token:token,p_round:st.roundId,p_status:'playing'}); }
      setMode('spin');
      setTimeout(startSpin, 250);
    }
  },120);

  async function poll(){
    const rows=await rpc('dd_active_round');
    const r=Array.isArray(rows)?rows[0]:null;
    if(!r){ st.roundId=null; st.status=null; setMode('idle'); renderCtrl(); return; }
    if(r.server_now) st.skew=new Date(r.server_now).getTime()-Date.now();
    const changedRound=st.roundId!==r.id;
    if(changedRound){ wonSet=new Set(); drawSignal=null; drawStarted=false; spinning=false; st.winCount=0; }
    st.roundId=r.id; st.status=r.status; st.prizes=parsePrizes(r.prize);
    st.countdownAt=r.countdown_at?new Date(r.countdown_at).getTime():null; st.count=r.player_count||0;

    if(r.status==='registration' || r.status==='closed'){
      drawStarted=false; drawSignal=null;
      if(token) await refreshPlayersAdmin();
      await fetchWinners();
      setMode('reg');
      const s=$('dStatus'); if(s){ if(r.status==='registration'){ s.className='status st-open'; s.textContent='🔓 Đang mở đăng ký'; } else { s.className='status st-closed'; s.textContent='🔒 Đã ngưng nhận — chuẩn bị quay'; } }
      const pr=$('prizeRow'); if(pr){ const html=st.prizes.map(p=>'<span class="pchip">🎁 '+esc(p.name)+(p.quantity>1?(' ×'+p.quantity):'')+'</span>').join(''); if(pr.dataset.sig!==html){ pr.dataset.sig=html; pr.innerHTML=html; } }
      await refreshBoardPublic();
    } else if(r.status==='countdown'){
      if(drawSignal!==r.countdown_at){ drawSignal=r.countdown_at; drawStarted=false; }
      if(token) await refreshPlayersAdmin();
      await fetchWinners();
      setMode('countdown');
    } else if(r.status==='playing'){
      if(token) await refreshPlayersAdmin();
      if(mode!=='spin') setMode('spin');
    } else if(r.status==='finished'){
      setMode('finished'); refreshWinners();
    }
    renderCtrl();
  }

  poll(); setInterval(poll,1500);
})();
</script>
</body>
</html>
