<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đang cập nhật thêm | Nguyễn Tấn Phong</title>
<meta name="description" content="Phần này đang được hoàn thiện. Về Trang Chủ hoặc liên hệ trực tiếp.">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V45VVRDW8T"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-V45VVRDW8T', { 'anonymize_ip': true, 'page_title': '404 - Đang cập nhật thêm' });
  function trackEvent(name, params) {
    if (typeof gtag === 'function') { gtag('event', name, params || {}); }
  }
  // Track 404 page view với path để biết user cố vào URL gì
  window.addEventListener('DOMContentLoaded', function () {
    trackEvent('404_view', { path: location.pathname });
  });
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --navy: #1a1a1a;
    --gold: #E0AA79;
    --gold-light: #f0c896;
    --cream: #2C2C2C;
    --text: #FFFFFF;
    --text-soft: rgba(255,255,255,0.5);
    --border: rgba(224, 170, 121, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    text-align: center;
    padding: 32px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c0-16.57 13.43-30 30-30m0 60c-16.57 0-30-13.43-30-30M30 30C30 46.57 16.57 60 0 60M0 0c16.57 0 30 13.43 30 30' fill='none' stroke='%23E0AA79' stroke-width='0.6' stroke-opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: -1;
  }
  a { color: inherit; text-decoration: none; }

  .error-code {
    font-size: clamp(6rem, 20vw, 12rem);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    opacity: 0.15;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    letter-spacing: 0.1em;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 480px;
  }

  .icon {
    width: 64px;
    height: 64px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    color: var(--gold);
    font-size: 1.5rem;
  }

  .title {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  .desc {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: stretch;
    max-width: 480px;
    margin: 0 auto;
  }

  .btn {
    flex: 1;
    padding: 13px 18px;
    border-radius: 8px;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }
  @media (max-width: 520px) {
    .actions { flex-direction: column; gap: 10px; max-width: 320px; }
    .btn { flex: none; width: 100%; padding: 13px 16px; }
  }

  /* FOOTER — đồng bộ với bản Đơn giản (cùng width 140/120 + font 8/7) */
  .footer-block {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .footer-sig {
    width: 140px;
    filter: brightness(0) invert(1);
    opacity: 0.85;
    display: block;
    margin: 0 auto 10px;
  }
  .footer-copy {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--text-soft);
    opacity: 0.5;
    text-transform: uppercase;
  }
  @media (max-width: 480px) {
    .footer-block { bottom: 14px; }
    .footer-sig { width: 120px; margin-bottom: 8px; }
    .footer-copy { font-size: 7px; }
  }

  .stagger { opacity: 0; animation: fadeUp 1s forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ========== STAGING BANNER (gold — cùng tone với nút Trang Chủ) ========== */
  #stagingBanner {
    display: none;
    position: fixed;
    top: 0; left: 0;
    z-index: 2000;
    width: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    background-size: 200% 100%;
    animation: stagingShimmer 5s ease infinite;
    color: var(--navy);
    text-align: center;
    padding: 9px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    box-shadow: 0 2px 16px rgba(224, 170, 121, 0.35);
  }
  #stagingBanner.show { display: block; }
  #stagingBanner span { opacity: 0.95; }
  @keyframes stagingShimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @media (max-width: 480px) {
    #stagingBanner { font-size: 9.5px; letter-spacing: 0.14em; padding: 7px 10px; }
  }
</style>
</head>
<body>
<!-- STAGING BANNER (gold) -->
<div id="stagingBanner">
  <i class="fas fa-sparkles" style="margin-right:10px"></i>
  <span>ĐANG CẬP NHẬT NHỮNG GÌ MỚI MẺ NHẤT</span>
</div>
<script>
  (function () {
    var BANNER_ALWAYS = true;
    var h = location.hostname;
    var isProduction = (h === 'nguyentanphong.com' || h === 'www.nguyentanphong.com');
    var el = document.getElementById('stagingBanner');
    if (el && (BANNER_ALWAYS || !isProduction)) el.classList.add('show');
  })();
</script>

<div class="error-code">404</div>

<div class="content stagger">
  <div class="icon"><i class="fas fa-compass"></i></div>
  <h1 class="title" id="t-title">Đang cập nhật thêm …</h1>
  <p class="desc" id="t-desc">Phần này đang được hoàn thiện.<br>Vui lòng quay lại trang chủ hoặc liên hệ trực tiếp.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary" id="t-home" onclick="trackEvent('404_home')"><i class="fas fa-home"></i> <span>Trang Chủ</span></a>
    <a href="tel:+84915159499" class="btn btn-ghost" id="t-call" onclick="trackEvent('404_call')"><i class="fas fa-phone-alt"></i> <span>Gọi Ngay</span></a>
    <a href="https://zalo.me/0915159499" target="_blank" class="btn btn-ghost" onclick="trackEvent('404_zalo')"><i class="fas fa-comment-dots"></i> <span>Zalo</span></a>
  </div>
</div>

<script>
  // 404 i18n — auto detect browser language
  (function () {
    var I18N = {
      en: {
        title: "More coming soon …",
        desc: "This page is being finished.<br>Please go back to the homepage or contact directly.",
        home: "Home", call: "Call Now", zalo: "Zalo",
        banner: "UPDATING THE LATEST THINGS",
        htmlLang: "en"
      },
      ja: {
        title: "近日更新 …",
        desc: "このページは準備中です。<br>ホームに戻るか、直接お問い合わせください。",
        home: "ホーム", call: "今すぐ電話", zalo: "Zalo",
        banner: "最新情報を更新中",
        htmlLang: "ja"
      },
      zh: {
        title: "更多内容即将推出 …",
        desc: "此部分正在完善中。<br>请返回首页或直接联系。",
        home: "首页", call: "立即致电", zalo: "Zalo",
        banner: "正在更新最新内容",
        htmlLang: "zh-CN"
      }
    };
    var lang = (navigator.language || 'vi').slice(0, 2).toLowerCase();
    if (I18N[lang]) {
      var t = I18N[lang];
      document.documentElement.lang = t.htmlLang;
      document.getElementById('t-title').innerHTML = t.title;
      document.getElementById('t-desc').innerHTML = t.desc;
      document.querySelector('#t-home span').textContent = t.home;
      document.querySelector('#t-call span').textContent = t.call;
      var bannerSpan = document.querySelector('#stagingBanner span');
      if (bannerSpan) bannerSpan.textContent = t.banner;
      document.title = t.title + ' | Nguyen Tan Phong';
    }
  })();
</script>

<!-- FOOTER — đồng bộ với bản Đơn giản -->
<div class="footer-block">
  <img src="NguyenTanPhong.png" alt="Chữ ký Nguyễn Tấn Phong" class="footer-sig" onerror="this.style.display='none';">
  <div class="footer-copy">&copy; 1981 – 2026 NGUYEN TAN PHONG. ALL RIGHTS RESERVED.</div>
</div>

</body>
</html>
