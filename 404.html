<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Không tìm thấy trang | Nguyễn Tấn Phong</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --navy: #1a1a1a;
    --gold: #E0AA79;
    --gold-light: #f0c896;
    --cream: #2C2C2C;
    --text: #FFFFFF;
    --text-soft: rgba(255,255,255,0.5);
    --border: rgba(224, 170, 121, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    text-align: center;
    padding: 32px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30c0-16.57 13.43-30 30-30m0 60c-16.57 0-30-13.43-30-30M30 30C30 46.57 16.57 60 0 60M0 0c16.57 0 30 13.43 30 30' fill='none' stroke='%23E0AA79' stroke-width='0.6' stroke-opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: -1;
  }
  a { color: inherit; text-decoration: none; }

  .error-code {
    font-size: clamp(6rem, 20vw, 12rem);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    opacity: 0.15;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    letter-spacing: 0.1em;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 480px;
  }

  .icon {
    width: 64px;
    height: 64px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    color: var(--gold);
    font-size: 1.5rem;
  }

  .title {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  .desc {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

  .footer-line {
    position: fixed;
    bottom: 24px;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-soft);
    opacity: 0.4;
    text-transform: uppercase;
  }

  .stagger { opacity: 0; animation: fadeUp 1s forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ========== STAGING BANNER ========== */
  #stagingBanner {
    display: none;
    position: fixed;
    top: 0; left: 0;
    z-index: 2000;
    width: 100%;
    background: linear-gradient(90deg, #ED1C24, #FF6B3D, #ED1C24);
    background-size: 200% 100%;
    animation: stagingShimmer 4s ease infinite;
    color: #fff;
    text-align: center;
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    box-shadow: 0 2px 20px rgba(237, 28, 36, 0.45);
  }
  #stagingBanner.show { display: block; }
  #stagingBanner span { opacity: 0.92; }
  @keyframes stagingShimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @media (max-width: 480px) {
    #stagingBanner { font-size: 9.5px; letter-spacing: 0.15em; padding: 7px 10px; }
  }
</style>
</head>
<body>
<!-- STAGING BANNER -->
<div id="stagingBanner">
  <i class="fas fa-wrench" style="margin-right:10px"></i>
  <span>ĐANG SỬA CHỮA · WEB TẠM · CHƯA PHẢI BẢN CHÍNH THỨC</span>
</div>
<script>
  (function () {
    var BANNER_ALWAYS = true;
    var h = location.hostname;
    var isProduction = (h === 'nguyentanphong.com' || h === 'www.nguyentanphong.com');
    var el = document.getElementById('stagingBanner');
    if (el && (BANNER_ALWAYS || !isProduction)) el.classList.add('show');
  })();
</script>

<div class="error-code">404</div>

<div class="content stagger">
  <div class="icon"><i class="fas fa-compass"></i></div>
  <h1 class="title">Trang không tồn tại</h1>
  <p class="desc">Đường dẫn bạn tìm kiếm không tồn tại hoặc đã được di chuyển.<br>Vui lòng quay lại trang chủ hoặc liên hệ trực tiếp.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Trang Chủ</a>
    <a href="tel:+84915159499" class="btn btn-ghost"><i class="fas fa-phone-alt"></i> Gọi Ngay</a>
    <a href="https://zalo.me/0915159499" target="_blank" class="btn btn-ghost"><i class="fas fa-comment-dots"></i> Zalo</a>
  </div>
</div>

<div class="footer-line">nguyentanphong.com</div>

</body>
</html>
