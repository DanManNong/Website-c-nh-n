<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0B0B">
<title>Đường Đua TMĐT — Màn hình</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0B0B0B; --graphite:#16160F; --cream:#F5EFE2; --champagne:#E8C274; --bronze:#9C6B2E; --green:#4ade80; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--ink); color:var(--cream); overflow:hidden; height:100vh}
  .hidden{display:none!important}
  .glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
  .glow.a{top:-160px;left:-140px;width:480px;height:480px;background:rgba(232,194,116,.12)}
  .glow.b{bottom:-180px;right:-140px;width:480px;height:480px;background:rgba(156,107,46,.22)}
  #root{position:relative;z-index:1;height:100vh;width:100vw}

  /* ---------- idle ---------- */
  .center{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;padding:40px}
  .center .big-emoji{font-size:6rem}
  .center h1{font-size:2.4rem;font-weight:800;background:linear-gradient(135deg,#F5EFE2,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .center p{color:rgba(245,239,226,.6);font-size:1.2rem}

  /* ---------- registration / board ---------- */
  .reg{height:100vh;display:flex;flex-direction:column;padding:3vh 3vw}
  .reg-top{text-align:center;margin-bottom:2vh}
  .reg-top .status{display:inline-block;font-size:1rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:6px 18px;border-radius:999px}
  .st-open{background:rgba(74,222,128,.16);color:#86efac}
  .st-closed{background:rgba(250,204,21,.16);color:#fde047}
  .reg-top h1{font-size:3.4vw;font-weight:900;margin-top:1vh;line-height:1.1}
  .reg-top h1 .pz{background:linear-gradient(135deg,#F5EFE2,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .reg-body{flex:1;display:flex;gap:3vw;min-height:0}
  .qr-side{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .qr-card{background:#fff;border-radius:28px;padding:26px;box-shadow:0 24px 70px -16px rgba(0,0,0,.7)}
  .qr-card .qr-box{width:min(34vh,360px);height:min(34vh,360px);display:flex;align-items:center;justify-content:center}
  .qr-card .qr-box img,.qr-card .qr-box canvas{width:100%!important;height:100%!important}
  .qr-side .cap{font-size:1.8vw;font-weight:800;color:var(--champagne);text-align:center}
  .qr-side .url{font-size:1.1vw;color:rgba(245,239,226,.6)}
  .board-side{flex:1;display:flex;flex-direction:column;min-width:0;background:rgba(22,22,15,.5);border:1px solid rgba(232,194,116,.18);border-radius:24px;padding:2vh 1.6vw}
  .board-side .bh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.4vh}
  .board-side .bh .t{font-size:1.5vw;font-weight:800;color:var(--champagne)}
  .board-side .bh .cnt{font-size:2.4vw;font-weight:900;color:var(--cream)}
  .board-side .bh .cnt small{font-size:1vw;font-weight:600;color:rgba(245,239,226,.5)}
  .pgrid{flex:1;overflow:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(15vw,1fr));grid-auto-rows:min-content;gap:0.8vh 0.8vw;align-content:start}
  .pchip{display:flex;align-items:center;gap:8px;background:rgba(11,11,11,.5);border:1px solid rgba(232,194,116,.14);border-radius:12px;padding:0.7vh 0.8vw;animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .pchip .av{width:2.2vw;height:2.2vw;min-width:30px;min-height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#1a1206;background:linear-gradient(135deg,#E8C274,#9C6B2E);font-size:1vw}
  .pchip .nm{font-weight:600;font-size:1.05vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .pchip .ph{font-size:.85vw;color:rgba(245,239,226,.45);font-variant-numeric:tabular-nums}
  .pempty{grid-column:1/-1;text-align:center;color:rgba(245,239,226,.4);font-size:1.4vw;padding:6vh 0}

  /* ---------- countdown ---------- */
  #cdOverlay{position:absolute;inset:0;z-index:20;background:rgba(11,11,11,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vh}
  #cdOverlay .lbl{font-size:2vw;letter-spacing:.3em;color:var(--champagne);text-transform:uppercase;font-weight:700}
  #cdOverlay .num{font-size:42vh;font-weight:900;line-height:.85;color:var(--champagne);text-shadow:0 0 80px rgba(232,194,116,.6);font-variant-numeric:tabular-nums}
  #cdOverlay .sub{font-size:2.2vw;font-weight:800;color:var(--cream)}

  /* ---------- race ---------- */
  #raceContainer{position:absolute;inset:0;z-index:10;background:#000}
  #raceContainer iframe{width:100%;height:100%;border:none;display:block}

  /* ---------- finished ---------- */
  .fin{height:100vh;display:flex;flex-direction:column;align-items:center;padding:4vh 3vw;overflow:hidden}
  .fin h1{font-size:3vw;font-weight:900;margin-bottom:2vh}
  .fin .wlist{width:min(900px,90vw);display:flex;flex-direction:column;gap:1.4vh;overflow:hidden}
  .wcard{display:flex;align-items:center;gap:1.4vw;background:rgba(232,194,116,.08);border:1px solid rgba(232,194,116,.3);border-radius:20px;padding:1.6vh 1.6vw}
  .wcard .ic{font-size:2.6vw}
  .wcard .pz{font-size:1vw;color:var(--champagne);font-weight:800;text-transform:uppercase;letter-spacing:.06em}
  .wcard .nm{font-size:2vw;font-weight:900}
  .wcard .ph{font-size:1.2vw;color:rgba(245,239,226,.5);font-weight:600}
</style>
</head>
<body>
<div class="glow a"></div><div class="glow b"></div>
<div id="root"></div>

<script src="/assets/supabase.min.js"></script>
<script src="/assets/qrcode.min.js"></script>
<script>
(function(){
  'use strict';
  const SB_URL='https://dcmtbgcltopnqsiedwlg.supabase.co';
  const SB_KEY='sb_publishable_goPNlFYvQUspbFSvDzkN3w_KMapxvUq';
  const PLAYER_URL='https://nguyentanphong.com/duongduatmdt';
  const CD_TOTAL=15;
  let sb=null; try{ sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}}); }catch(e){ console.error(e); }

  // token từ hash (#t=...) — admin mở display kèm token, không hiện trên màn
  let token=null;
  try{
    const m=(location.hash||'').match(/t=([^&]+)/);
    if(m){ token=decodeURIComponent(m[1]); history.replaceState(null,'',location.pathname+location.search); }
  }catch(_e){}

  const $=id=>document.getElementById(id);
  const root=$('root');
  function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  function initials(n){const p=(n||'').trim().split(/\s+/);return (p[p.length-1]||'?').slice(0,1).toUpperCase();}

  async function rpc(fn,args){ if(!sb)return null; const{data,error}=await sb.rpc(fn,args||{}); if(error){console.warn(fn,error.message);return null;} return data; }

  let st={ roundId:null, status:null, prize:null, qty:1, countdownAt:null, skew:0, count:0 };
  let players=[];            // [{id,name,phone}] (cần token)
  let codeMap={};
  let mode=null;             // mode đang render: idle|reg|countdown|race|finished
  let iframeReady=false;
  let drawSignal=null;       // countdown_at của lượt quay đang xử lý
  let drawStarted=false;     // đã START_RACE cho drawSignal hiện tại chưa
  let recorded=new Set();    // code đã ghi winner (chống ghi trùng)
  let qrDone=false;

  // ---------- render shells ----------
  function setMode(m){
    if(mode===m) return false;
    mode=m;
    if(m==='idle'){
      root.innerHTML='<div class="center"><div class="big-emoji">🏁</div><h1>Đường Đua Thương Mại Điện Tử</h1><p>Đang chờ ban tổ chức mở phiên…</p></div>';
    } else if(m==='reg'){
      root.innerHTML=
        '<div class="reg">'+
          '<div class="reg-top"><span class="status" id="dStatus"></span><h1>🏁 <span class="pz" id="dPrize">Giải thưởng</span></h1></div>'+
          '<div class="reg-body">'+
            '<div class="qr-side"><div class="qr-card"><div class="qr-box" id="qrBox"></div></div><div class="cap">📲 Quét mã để tham gia</div><div class="url">nguyentanphong.com/duongduatmdt</div></div>'+
            '<div class="board-side"><div class="bh"><span class="t">Người chơi đã tham gia</span><span class="cnt"><span id="dCount">0</span> <small>người</small></span></div><div class="pgrid" id="pgrid"></div></div>'+
          '</div>'+
        '</div>';
      qrDone=false; renderQR();
    } else if(m==='countdown'){
      ensureRace();
      if(!$('cdOverlay')){ const o=document.createElement('div'); o.id='cdOverlay'; o.innerHTML='<div class="lbl">Sắp xuất phát</div><div class="num" id="cdNum">15</div><div class="sub">Chuẩn bị!</div>'; root.appendChild(o); }
    } else if(m==='race'){
      ensureRace();
      const o=$('cdOverlay'); if(o) o.remove();
    } else if(m==='finished'){
      const rc=$('raceContainer'); if(rc) rc.remove();
      root.innerHTML='<div class="fin"><h1>🏆 Người trúng giải</h1><div class="wlist" id="wlist"></div></div>';
      refreshWinners();
    }
    return true;
  }

  function renderQR(){
    const box=$('qrBox'); if(!box || qrDone || typeof QRCode==='undefined') return;
    box.innerHTML=''; try{ new QRCode(box,{text:PLAYER_URL,width:340,height:340,colorDark:'#0B0B0B',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M}); qrDone=true; }catch(e){}
  }

  // race iframe — mount once, keep across draws
  function ensureRace(){
    if($('raceContainer')) return;
    const c=document.createElement('div'); c.id='raceContainer';
    c.innerHTML='<iframe id="raceFrame" src="/duong-dua-tmdt.html?embedded=1" title="Đường đua"></iframe>';
    root.appendChild(c);
    const f=$('raceFrame');
    f.addEventListener('load',function(){ setTimeout(()=>{ try{ frameWin().postMessage({type:'PING'},'*'); }catch(e){} },400); });
  }
  function frameWin(){ const f=$('raceFrame'); return f&&f.contentWindow; }
  function sendParticipants(){
    if(!iframeReady || !frameWin()) return;
    const list=players.map((p,i)=>({code:String(i+1).padStart(2,'0'),name:p.name,avatar:null}));
    frameWin().postMessage({type:'SET_PARTICIPANTS',participants:list,prize:(st.prize||'Giải thưởng'),prizeQty:(st.qty||1)},'*');
  }

  // ---------- board ----------
  async function refreshBoardPublic(){
    if(!st.roundId) return;
    const rows=await rpc('dd_board',{p_round:st.roundId});
    const g=$('pgrid'); if(!g) return;
    if(!rows||!rows.length){ g.innerHTML='<div class="pempty">Chưa có ai. Hãy là người đầu tiên quét mã! 🎯</div>'; return; }
    const sig=rows.map(r=>r.phone_masked+r.name).join('|');
    if(g.dataset.sig===sig) return; g.dataset.sig=sig;
    g.innerHTML=rows.map(r=>'<div class="pchip"><div class="av">'+esc(initials(r.name))+'</div><div class="nm">'+esc(r.name)+'</div><div class="ph">'+esc(r.phone_masked)+'</div></div>').join('');
    const c=$('dCount'); if(c) c.textContent=rows.length;
  }
  async function refreshPlayersAdmin(){
    if(!st.roundId || !token) return;
    const rows=await rpc('dd_admin_players',{p_token:token,p_round:st.roundId});
    if(Array.isArray(rows)){
      players=rows.map(r=>({id:r.id,name:r.name,phone:r.phone}));
      codeMap={}; players.forEach((p,i)=>{ codeMap[String(i+1).padStart(2,'0')]=p; });
    }
  }
  async function refreshWinners(){
    if(!st.roundId) return;
    const rows=await rpc('dd_winners_list',{p_round:st.roundId});
    const box=$('wlist'); if(!box) return;
    if(!rows||!rows.length){ box.innerHTML='<div class="pempty">Chưa có người trúng.</div>'; return; }
    box.innerHTML=rows.map(w=>'<div class="wcard"><div class="ic">🏆</div><div style="flex:1;min-width:0"><div class="pz">'+esc(w.prize)+'</div><div class="nm">'+esc(w.name)+' <span class="ph">'+esc(w.phone_masked)+'</span></div></div></div>').join('');
  }

  // ---------- winner from iframe ----------
  window.addEventListener('message', function(e){
    const d=e.data; if(!d||!d.type) return;
    if(d.type==='IFRAME_READY'){ iframeReady=true; sendParticipants(); return; }
    if(d.type==='RACE_WINNER'){
      const code=d.code; if(recorded.has(code)) return; recorded.add(code);
      const p=codeMap[code];
      const name=p?p.name:(d.name||'—'), phone=p?p.phone:'', prize=st.prize||d.prize||'Giải thưởng';
      if(token){ rpc('dd_admin_add_winner',{p_token:token,p_round:st.roundId,p_name:name,p_phone:phone,p_prize:prize,p_position:recorded.size}); }
      return;
    }
  });

  // ---------- countdown tick ----------
  setInterval(function(){
    if(mode!=='countdown'||!st.countdownAt) return;
    const nowS=Date.now()+st.skew;
    let remain=CD_TOTAL-(nowS-st.countdownAt)/1000; if(remain<0)remain=0;
    const el=$('cdNum'); if(el) el.textContent=Math.ceil(remain);
    if(remain<=0 && !drawStarted){
      drawStarted=true;
      // flip sang playing + chạy đua (cần token)
      if(token){ rpc('dd_admin_set_status',{p_token:token,p_round:st.roundId,p_status:'playing'}); }
      setMode('race');
      sendParticipants();
      setTimeout(()=>{ if(frameWin()) frameWin().postMessage({type:'START_RACE'},'*'); }, 200);
    }
  },120);

  // ---------- main poll ----------
  async function poll(){
    const rows=await rpc('dd_active_round');
    const r=Array.isArray(rows)?rows[0]:null;
    if(!r){ st.roundId=null; st.status=null; setMode('idle'); return; }
    if(r.server_now) st.skew=new Date(r.server_now).getTime()-Date.now();
    const changedRound=st.roundId!==r.id;
    if(changedRound){ recorded=new Set(); drawSignal=null; drawStarted=false; const rc=$('raceContainer'); if(rc) rc.remove(); iframeReady=false; }
    st.roundId=r.id; st.status=r.status; st.prize=r.prize;
    st.countdownAt=r.countdown_at?new Date(r.countdown_at).getTime():null;
    st.count=r.player_count||0;
    st.qty=(r.prize_qty!=null && r.prize_qty>0)?r.prize_qty:1;

    if(r.status==='registration' || r.status==='closed'){
      drawStarted=false; drawSignal=null;
      if(setMode('reg')){ /* fresh */ }
      const s=$('dStatus'); if(s){ if(r.status==='registration'){ s.className='status st-open'; s.textContent='🔓 Đang mở đăng ký'; } else { s.className='status st-closed'; s.textContent='🔒 Đã ngưng nhận'; } }
      const pz=$('dPrize'); if(pz) pz.textContent=st.prize||'Giải thưởng';
      await refreshBoardPublic();
      if(token) await refreshPlayersAdmin();
      sendParticipants();
    } else if(r.status==='countdown'){
      // tín hiệu quay mới = countdown_at đổi
      if(drawSignal!==r.countdown_at){ drawSignal=r.countdown_at; drawStarted=false; }
      if(token) await refreshPlayersAdmin();
      setMode('countdown');
      sendParticipants();
    } else if(r.status==='playing'){
      if(token) await refreshPlayersAdmin();
      setMode('race');
      sendParticipants();
    } else if(r.status==='finished'){
      setMode('finished'); refreshWinners();
    }
  }

  poll();
  setInterval(poll, 1500);
})();
</script>
</body>
</html>
