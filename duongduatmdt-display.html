<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0B0B">
<title>Màn hình — Đường Đua TMĐT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0B0B0B; --graphite:#16160F; --cream:#F5EFE2; --champagne:#E8C274; --bronze:#9C6B2E; --green:#4ade80; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--ink); color:var(--cream); overflow:hidden; height:100vh}
  .hidden{display:none!important}
  .glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
  .glow.a{top:-160px;left:-140px;width:480px;height:480px;background:rgba(232,194,116,.12)}
  .glow.b{bottom:-180px;right:-140px;width:480px;height:480px;background:rgba(156,107,46,.22)}
  #root{position:relative;z-index:1;height:100vh;width:100vw}
  #topName{position:fixed;top:0;left:0;right:0;z-index:40;text-align:center;pointer-events:none;padding:1vh 0;font-weight:900;font-size:1.5vw;letter-spacing:.06em;color:var(--champagne);background:linear-gradient(180deg,rgba(11,11,11,.7),rgba(11,11,11,0));text-shadow:0 2px 8px rgba(0,0,0,.6)}
  #topName span{color:rgba(245,239,226,.5);font-weight:700;font-size:.7em}
  #ctrlBar{position:fixed;bottom:0;left:0;right:0;z-index:45;display:flex;gap:1vw;justify-content:center;padding:1.4vh 2vw calc(1.4vh + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(11,11,11,.85),rgba(11,11,11,0))}
  #ctrlBar button{border:none;border-radius:14px;padding:1.4vh 3vw;font-size:1.5vw;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:.6vw;transition:transform .1s}
  #ctrlBar button:active{transform:scale(.97)}
  #ctrlBar .b-next{background:linear-gradient(135deg,#E8C274,#C9A24E);color:#1a1206}
  #ctrlBar .b-finish{background:#b91c1c;color:#fff}

  .center{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;padding:40px}
  .center .flag{font-size:7rem;line-height:1}
  .center h1{font-size:min(4.6vw,8vh);font-weight:900;white-space:nowrap;background:linear-gradient(180deg,#fff,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .center .subt{font-size:1.7vw;font-weight:700;color:var(--champagne);opacity:.85}
  .center p{color:rgba(245,239,226,.6);font-size:1.2rem}

  .hero{text-align:center;padding:1.4vh 2vw .4vh;overflow:hidden;max-width:100vw}
  .hero .flag{font-size:4vh;line-height:1}
  .hero .slogan{white-space:nowrap;font-weight:900;font-size:min(3.8vw,6.4vh);letter-spacing:-.02em;margin-top:.2vh;background:linear-gradient(180deg,#fff,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero .title{white-space:nowrap;font-weight:700;font-size:1.6vw;color:var(--champagne);margin-top:.1vh;letter-spacing:.06em;opacity:.85}

  /* selector */
  .selector{display:flex;gap:1.4vw;justify-content:center;margin:.8vh 0}
  .gsel{display:flex;align-items:center;gap:.6vw;border:2px solid rgba(232,194,116,.3);background:rgba(22,22,15,.6);color:rgba(245,239,226,.7);
    border-radius:999px;padding:.8vh 2vw;font-size:1.5vw;font-weight:800;cursor:pointer;transition:all .15s}
  .gsel .em{font-size:1.9vw}
  .gsel.active{background:linear-gradient(135deg,#E8C274,#C9A24E);color:#1a1206;border-color:#E8C274;box-shadow:0 8px 24px -8px rgba(232,194,116,.6)}

  .reg{height:100vh;display:flex;flex-direction:column;padding:1vh 3vw 2vh}
  .prize-row{display:flex;flex-wrap:wrap;gap:.6vw;justify-content:center;margin:.6vh 0}
  .pchip{background:rgba(232,194,116,.12);border:1px solid rgba(232,194,116,.3);color:var(--champagne);border-radius:999px;padding:.6vh 1.3vw;font-size:1.4vw;font-weight:700;white-space:nowrap}
  .status{display:block;text-align:center;font-size:1.2vw;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.4vh}
  .st-open{color:#86efac} .st-closed{color:#fde047}
  .reg-body{flex:1;display:flex;gap:3vw;min-height:0}
  .qr-side{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  .qr-card{background:#fff;border-radius:24px;padding:20px;box-shadow:0 24px 70px -16px rgba(0,0,0,.7)}
  .qr-card .qr-box{width:min(30vh,320px);height:min(30vh,320px);display:flex;align-items:center;justify-content:center}
  .qr-card .qr-box img,.qr-card .qr-box canvas{width:100%!important;height:100%!important}
  .qr-side .cap{font-size:1.6vw;font-weight:800;color:var(--champagne)}
  .qr-side .url{font-size:1vw;color:rgba(245,239,226,.6)}
  .qr-side .qstart{margin-top:4px;border:none;border-radius:16px;padding:1.6vh 3.5vw;font-size:2vw;font-weight:900;font-family:inherit;cursor:pointer;background:linear-gradient(135deg,#E8C274,#C9A24E);color:#1a1206;box-shadow:0 14px 40px -10px rgba(232,194,116,.6)}
  .qr-side .qstart:active{transform:scale(.97)}
  .board-side{flex:1;display:flex;flex-direction:column;min-width:0;background:rgba(22,22,15,.5);border:1px solid rgba(232,194,116,.18);border-radius:24px;padding:1.4vh 1.4vw}
  .board-side .bh .t{font-size:1.4vw;font-weight:800;color:var(--champagne)}
  .pgrid{flex:1;overflow:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(15vw,1fr));grid-auto-rows:min-content;gap:.6vh .8vw;align-content:start;margin-top:1vh}
  .pchip2{display:flex;align-items:center;gap:8px;background:rgba(11,11,11,.5);border:1px solid rgba(232,194,116,.14);border-radius:12px;padding:.55vh .8vw}
  .pchip2 .em{font-size:1.9vw;line-height:1;flex-shrink:0}
  .pchip2 .nm{font-weight:600;font-size:1.05vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .pchip2 .ph{font-size:.85vw;color:rgba(245,239,226,.45)}
  .pempty{grid-column:1/-1;text-align:center;color:rgba(245,239,226,.4);font-size:1.4vw;padding:6vh 0}

  #cdOverlay{position:fixed;inset:0;z-index:30;background:rgba(11,11,11,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5vh}
  #cdOverlay .pz{font-size:2.4vw;font-weight:900;color:var(--champagne)}
  #cdOverlay .lbl{font-size:1.6vw;letter-spacing:.3em;color:rgba(245,239,226,.6);text-transform:uppercase}
  #cdOverlay .num{font-size:40vh;font-weight:900;line-height:.85;color:var(--champagne);text-shadow:0 0 80px rgba(232,194,116,.6)}

  #raceContainer{position:fixed;inset:0;z-index:10;background:#000}
  #raceContainer iframe{width:100%;height:100%;border:none;display:block}

  /* wheel */
  .wheelStage{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1vh;text-align:center;padding-top:4vh}
  .wheelStage .pz{font-size:2.2vw;font-weight:900;color:var(--champagne)}
  .wheelWrap{position:relative;width:min(68vh,70vw);height:min(68vh,70vw)}
  #wheelSvg{width:100%;height:100%;transform:rotate(0deg);transform-origin:50% 50%;display:block;filter:drop-shadow(0 18px 55px rgba(0,0,0,.65))}
  #wheelSvg.spin-anim{transition:transform 5.4s cubic-bezier(.12,.64,.08,1)}
  .wheelWrap .pointer{position:absolute;top:-.4vh;left:50%;transform:translateX(-50%);z-index:6;width:0;height:0;
    border-left:1.9vh solid transparent;border-right:1.9vh solid transparent;border-top:3.6vh solid #fff;filter:drop-shadow(0 3px 7px rgba(0,0,0,.7))}
  .wheelWrap .hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;width:13vh;height:13vh;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fff,#E8C274 55%,#9C6B2E);display:flex;align-items:center;justify-content:center;font-size:6vh;
    box-shadow:0 6px 22px rgba(0,0,0,.55),inset 0 -5px 12px rgba(0,0,0,.28),0 0 0 .7vh rgba(11,11,11,.85)}
  .wheelStage .result{min-height:5vh;font-size:3.4vw;font-weight:900;white-space:nowrap;background:linear-gradient(180deg,#fff,#E8C274);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .wheelStage .hint{font-size:1.5vw;color:rgba(245,239,226,.5);font-weight:700;letter-spacing:.08em}

  .fin{height:100vh;display:flex;flex-direction:column;align-items:center;padding:3vh 3vw;overflow:hidden}
  .fin .flag{font-size:5vh}
  .fin h1{font-size:2.8vw;font-weight:900;margin:.6vh 0 2vh}
  .fin .wlist{width:min(960px,92vw);display:flex;flex-direction:column;gap:1.2vh;overflow:hidden}
  .wcard{display:flex;align-items:center;gap:1.4vw;background:rgba(232,194,116,.08);border:1px solid rgba(232,194,116,.3);border-radius:18px;padding:1.4vh 1.6vw}
  .wcard .ic{font-size:2.4vw}
  .wcard .pz{font-size:1vw;color:var(--champagne);font-weight:800;text-transform:uppercase;letter-spacing:.05em}
  .wcard .nm{font-size:1.9vw;font-weight:900}
  .wcard .ph{font-size:1.1vw;color:rgba(245,239,226,.5);font-weight:600}

  .confetti{position:fixed;inset:0;z-index:35;pointer-events:none;overflow:hidden}
  .cf{position:absolute;top:-20px;width:12px;height:12px;border-radius:2px;animation:cfall 2.6s ease-in forwards}
  @keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(105vh) rotate(720deg)}}
</style>
</head>
<body>
<div class="glow a"></div><div class="glow b"></div>
<div id="root"></div>
<div id="topName">🏁 TĂNG TRƯỞNG THẦN TỐC <span>· Đường đua TMĐT</span></div>
<div id="ctrlBar" class="hidden"></div>
<div class="confetti hidden" id="confetti"></div>

<script src="/assets/supabase.min.js"></script>
<script src="/assets/qrcode.min.js"></script>
<script>
(function(){
  'use strict';
  const SB_URL='https://dcmtbgcltopnqsiedwlg.supabase.co';
  const SB_KEY='sb_publishable_goPNlFYvQUspbFSvDzkN3w_KMapxvUq';
  const PLAYER_URL='https://nguyentanphong.com/duongduatmdt';
  const CD_TOTAL=15;
  const ZOO=['🦁','🐱','🐰','🐻','🦊','🐼','🦉','🐧','🦆','🐸','🦄','🐶','🐘','🐯','🐵','🐬','🐴','🦌','🐨','🐹','🐢','🐳','🦅','🐷'];
  const animal=i=>ZOO[((i%24)+24)%24];
  let sb=null; try{ sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}}); }catch(e){ console.error(e); }
  let token='VOBF2026';
  try{ const m=(location.hash||'').match(/t=([^&]+)/); if(m){ token=decodeURIComponent(m[1]); history.replaceState(null,'',location.pathname+location.search); } }catch(_e){}

  let gameType=localStorage.getItem('dd_gametype')||'race';   // 'race' | 'wheel'

  const $=id=>document.getElementById(id);
  const root=$('root');
  function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  function mask(p){return 'xxx'+String(p||'').replace(/\D/g,'').slice(-3);}
  function shortName(n){var p=String(n||'').trim().split(/\s+/).filter(Boolean);return p.slice(-2).join(' ')||'?';}
  function parsePrizes(p){ if(!p) return [{name:'Giải thưởng',quantity:1}]; try{ const a=JSON.parse(p); if(Array.isArray(a)&&a.length) return a.map(x=>({name:String(x.name||'Giải'),quantity:Math.max(1,parseInt(x.quantity,10)||1)})); }catch(e){} return [{name:p,quantity:1}]; }
  async function rpc(fn,args){ if(!sb)return null; const{data,error}=await sb.rpc(fn,args||{}); if(error){console.warn(fn,error.message);return null;} return data; }
  async function setStatus(s){ if(!token||!st.roundId) return; await rpc('dd_admin_set_status',{p_token:token,p_round:st.roundId,p_status:s}); poll(); }

  let st={ roundId:null, status:null, prizes:[{name:'Giải thưởng',quantity:1}], countdownAt:null, skew:0, count:0, winCount:0 };
  let players=[], codeMap={}, mode=null, iframeReady=false, drawSignal=null, drawStarted=false, winHandled=false, wonSet=new Set(), qrDone=false, spinning=false, wheelRot=0, lastCtrlKey=null;

  function totalSlots(){ return st.prizes.reduce((s,p)=>s+p.quantity,0); }
  function effWin(){ return Math.max(st.winCount, wonSet.size); }
  function currentGroup(){ let acc=0; const w=effWin(); for(let i=0;i<st.prizes.length;i++){ const p=st.prizes[i]; if(w<acc+p.quantity) return {name:p.name,quantity:p.quantity,slot:(w-acc)+1}; acc+=p.quantity; } return null; }
  function playerIndex(p){ for(let i=0;i<players.length;i++){ if(players[i].id===p.id) return i; } return 0; }
  function rebuildWon(winners){ const ws=new Set(); (winners||[]).forEach(function(w){ const last3=String(w.phone_masked||'').slice(-3); const p=players.find(x=>x.name===w.name && String(x.phone).slice(-3)===last3 && !ws.has(x.id)); if(p) ws.add(p.id); }); if(ws.size>=wonSet.size) wonSet=ws; }

  // ---------- audio + confetti ----------
  let actx=null; function ac(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} return actx; }
  function beep(f,d,v,type){ const c=ac(); if(!c)return; try{ const o=c.createOscillator(),g=c.createGain(); o.type=type||'sine'; o.frequency.value=f; g.gain.setValueAtTime(v||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(d||0.1)); o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+(d||0.1)); }catch(e){} }
  function tick(){ beep(440,0.04,0.03,'square'); }
  function fanfare(){ [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.3,0.09,'sine'),i*130)); }
  function confetti(){ const box=$('confetti'); box.classList.remove('hidden'); box.innerHTML=''; const cols=['#E8C274','#C9A24E','#fff','#4ade80','#fb7185','#60a5fa']; for(let i=0;i<90;i++){ const d=document.createElement('div'); d.className='cf'; d.style.left=Math.random()*100+'%'; d.style.background=cols[i%cols.length]; d.style.animationDelay=(Math.random()*0.5)+'s'; box.appendChild(d); } setTimeout(()=>{ box.classList.add('hidden'); box.innerHTML=''; },3200); }

  // ---------- shared record ----------
  function recordWin(p){
    const g=currentGroup()||{name:(st.prizes[0]&&st.prizes[0].name)||'Giải thưởng'};  // tính giải TRƯỚC khi cộng
    if(p) wonSet.add(p.id);
    if(token) rpc('dd_admin_add_winner',{p_token:token,p_round:st.roundId,p_name:p.name,p_phone:p.phone,p_prize:g.name,p_position:effWin()});
  }

  // ---------- stage helpers ----------
  function clearStage(){ const rc=$('raceContainer'); if(rc) rc.remove(); const cd=$('cdOverlay'); if(cd) cd.remove(); }
  const HERO='<div class="hero"><div class="flag">🏁</div><div class="slogan">Tăng trưởng thần tốc</div><div class="title">Đường Đua Thương Mại Điện Tử</div></div>';

  function setMode(m){
    if(mode===m && m!=='finished') return false;
    mode=m;
    var tn=$('topName'); if(tn) tn.style.display=(m==='countdown'||m==='play')?'block':'none';
    if(m==='idle'){
      clearStage();
      root.innerHTML='<div class="center"><div class="flag">🏁</div><h1>Tăng trưởng thần tốc</h1><div class="subt">Đường Đua Thương Mại Điện Tử</div><p>Đang chờ ban tổ chức mở phiên…</p></div>';
    } else if(m==='reg'){
      clearStage();
      root.innerHTML='<div class="reg">'+HERO+
        '<span class="status" id="dStatus"></span>'+
        '<div class="selector" id="selector"></div>'+
        '<div class="prize-row" id="prizeRow"></div>'+
        '<div class="reg-body">'+
          '<div class="qr-side"><div class="qr-card"><div class="qr-box" id="qrBox"></div></div><div class="cap">📲 Quét mã để tham gia</div><div class="url">nguyentanphong.com/duongduatmdt</div><div id="qrStart"></div></div>'+
          '<div class="board-side"><div class="bh"><span class="t">Người chơi đã tham gia</span></div><div class="pgrid" id="pgrid"></div></div>'+
        '</div></div>';
      qrDone=false; renderQR(); renderSelector();
    } else if(m==='countdown'){
      root.innerHTML='';
      if(gameType==='race') ensureRace();
      if(!$('cdOverlay')){ const o=document.createElement('div'); o.id='cdOverlay'; o.innerHTML='<div class="pz" id="cdPrize"></div><div class="lbl">Sắp bắt đầu</div><div class="num" id="cdNum">15</div>'; document.body.appendChild(o); }
    } else if(m==='play'){
      const cd=$('cdOverlay'); if(cd) cd.remove();
      if(gameType==='race'){ ensureRace(); root.innerHTML=''; }
      else { const rc=$('raceContainer'); if(rc) rc.remove(); root.innerHTML='<div class="wheelStage"><div class="pz" id="spinPz"></div><div class="wheelWrap"><div class="pointer"></div><svg id="wheelSvg" viewBox="0 0 640 640"></svg><div class="hub">🎯</div></div><div class="result" id="spinResult"></div><div class="hint" id="spinHint">Đang quay…</div></div>'; }
    } else if(m==='finished'){
      clearStage();
      root.innerHTML='<div class="fin"><div class="flag">🏆</div><h1>Người trúng giải</h1><div class="wlist" id="wlist"></div></div>';
      refreshWinners();
    }
    return true;
  }
  function renderQR(){ const box=$('qrBox'); if(!box||qrDone||typeof QRCode==='undefined')return; box.innerHTML=''; try{ new QRCode(box,{text:PLAYER_URL,width:320,height:320,colorDark:'#0B0B0B',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M}); qrDone=true; }catch(e){} }
  function renderSelector(){
    const s=$('selector'); if(!s) return;
    s.innerHTML='<button class="gsel'+(gameType==='race'?' active':'')+'" data-g="race"><span class="em">🏁</span> Đường đua</button>'+
                '<button class="gsel'+(gameType==='wheel'?' active':'')+'" data-g="wheel"><span class="em">🎡</span> Quay số</button>';
    s.querySelectorAll('.gsel').forEach(b=>b.addEventListener('click',function(){ gameType=this.dataset.g; localStorage.setItem('dd_gametype',gameType); renderSelector(); }));
  }

  // ---------- RACE (iframe) ----------
  function ensureRace(){
    if($('raceContainer')) return;
    const c=document.createElement('div'); c.id='raceContainer';
    c.innerHTML='<iframe id="raceFrame" src="/duong-dua-tmdt.html?embedded=1" title="Đường đua"></iframe>';
    document.body.appendChild(c);
    $('raceFrame').addEventListener('load',function(){ setTimeout(()=>{ try{ frameWin().postMessage({type:'PING'},'*'); }catch(e){} },400); });
  }
  function frameWin(){ const f=$('raceFrame'); return f&&f.contentWindow; }
  function sendParticipants(){
    if(!iframeReady || !frameWin()) return;
    const g=currentGroup()||st.prizes[st.prizes.length-1]||{name:'Giải thưởng',quantity:1};
    const elig=players.filter(p=>!wonSet.has(p.id));
    codeMap={}; const list=elig.map(function(p,i){ const code=String(i+1).padStart(2,'0'); codeMap[code]=p; return {code:code,name:p.name,avatar:null}; });
    frameWin().postMessage({type:'SET_PARTICIPANTS',participants:list,prize:g.name,prizeQty:g.quantity},'*');
  }
  window.addEventListener('message', function(e){
    const d=e.data; if(!d||!d.type) return;
    if(d.type==='IFRAME_READY'){ iframeReady=true; sendParticipants(); return; }
    if(d.type==='RACE_WINNER'){
      if(winHandled) return; winHandled=true;
      const p=codeMap[d.code]; if(p) recordWin(p);
      return;
    }
  });

  // ---------- WHEEL ----------
  function buildWheel(labels){
    const N=labels.length, cx=320, cy=320, R=304, rLabel=198, seg=360/N;
    const gold='#E8C274', dark='#241d12';
    let s='';
    for(let i=0;i<N;i++){
      const a0=(i*seg-90)*Math.PI/180, a1=((i+1)*seg-90)*Math.PI/180;
      const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0), x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
      const fill=(i%2===0)?gold:dark;
      s+='<path d="M'+cx+' '+cy+' L'+x0.toFixed(1)+' '+y0.toFixed(1)+' A'+R+' '+R+' 0 0 1 '+x1.toFixed(1)+' '+y1.toFixed(1)+' Z" fill="'+fill+'" stroke="rgba(11,11,11,.65)" stroke-width="2"/>';
      const am=((i+0.5)*seg-90)*Math.PI/180;
      const lx=cx+rLabel*Math.cos(am), ly=cy+rLabel*Math.sin(am);
      let rot=(i+0.5)*seg; if(rot>90 && rot<270) rot+=180;   // lật chữ nửa dưới cho dễ đọc
      s+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" fill="'+((i%2===0)?'#1a1206':'#F5EFE2')+'" font-size="22" font-weight="800" text-anchor="middle" dominant-baseline="middle" transform="rotate('+rot.toFixed(1)+' '+lx.toFixed(1)+' '+ly.toFixed(1)+')">'+esc(shortName(labels[i]))+'</text>';
    }
    s+='<circle cx="320" cy="320" r="304" fill="none" stroke="#E8C274" stroke-width="6"/>';
    s+='<circle cx="320" cy="320" r="298" fill="none" stroke="rgba(11,11,11,.5)" stroke-width="2"/>';
    return s;
  }
  function startSpin(){
    if(spinning) return;
    const elig=players.filter(p=>!wonSet.has(p.id));
    const g=currentGroup();
    const hint=$('spinHint');
    if(!elig.length || !g){ if(hint) hint.textContent='Đã quay đủ giải.'; return; }
    spinning=true;
    const pz=$('spinPz'); if(pz) pz.textContent='🎁 '+g.name+(g.quantity>1?(' ('+g.slot+'/'+g.quantity+')'):'');
    const res=$('spinResult'); if(res) res.textContent='';
    if(hint) hint.textContent='Đang quay…';
    const winner=elig[Math.floor(Math.random()*elig.length)];
    const N=12, wIdx=Math.floor(Math.random()*N);
    const others=players.filter(p=>p.id!==winner.id);
    for(let i=others.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=others[i];others[i]=others[j];others[j]=t; }
    const labels=[]; let oi=0;
    for(let i=0;i<N;i++){ labels.push(i===wIdx ? winner.name : ((others[oi++]||winner).name)); }
    const svg=$('wheelSvg'); if(!svg){ spinning=false; return; }
    svg.innerHTML=buildWheel(labels);
    svg.classList.remove('spin-anim');
    wheelRot=((wheelRot%360)+360)%360; svg.style.transform='rotate('+wheelRot+'deg)';
    void svg.offsetWidth;
    const seg=360/N, desired=360-((wIdx+0.5)*seg), delta=((desired-wheelRot)%360+360)%360, jitter=(Math.random()-0.5)*(seg*0.55);
    const target=wheelRot+360*6+delta+jitter;
    try{ ac(); }catch(e){}
    svg.classList.add('spin-anim'); svg.style.transform='rotate('+target+'deg)'; wheelRot=target;
    let tk=0; const tkInt=setInterval(function(){ tk++; if(tk>26||!spinning){clearInterval(tkInt);return;} tick(); },190);
    let done=false;
    function finish(){ if(done) return; done=true; clearInterval(tkInt);
      if(!winHandled){ winHandled=true; recordWin(winner); }
      if(res) res.textContent='🏆 '+winner.name;
      if(hint) hint.textContent='🎉 Chúc mừng!';
      confetti(); fanfare();
      spinning=false; lastCtrlKey=null; renderCtrl();
    }
    svg.addEventListener('transitionend', finish, {once:true});
    setTimeout(finish, 5800);
  }

  function triggerDraw(){
    if(gameType==='race'){ sendParticipants(); setTimeout(()=>{ if(frameWin()) frameWin().postMessage({type:'START_RACE'},'*'); },220); }
    else { startSpin(); }
  }

  // ---------- board / winners ----------
  async function refreshBoardPublic(){
    if(!st.roundId) return;
    const rows=await rpc('dd_board',{p_round:st.roundId});
    const g=$('pgrid'); if(!g) return;
    if(!rows||!rows.length){ g.innerHTML='<div class="pempty">Chưa có ai. Hãy là người đầu tiên quét mã! 🎯</div>'; return; }
    const sig=rows.map(r=>r.phone_masked+r.name).join('|'); if(g.dataset.sig===sig) return; g.dataset.sig=sig;
    g.innerHTML=rows.map((r,i)=>'<div class="pchip2"><span class="em">'+animal(i)+'</span><div class="nm">'+esc(r.name)+'</div><div class="ph">'+esc(r.phone_masked)+'</div></div>').join('');
  }
  async function refreshPlayersAdmin(){
    if(!st.roundId || !token) return;
    const rows=await rpc('dd_admin_players',{p_token:token,p_round:st.roundId});
    if(Array.isArray(rows)) players=rows.map(r=>({id:r.id,name:r.name,phone:r.phone}));
  }
  async function fetchWinCount(){ if(!st.roundId) return; const rows=await rpc('dd_winners_list',{p_round:st.roundId}); if(Array.isArray(rows)){ st.winCount=rows.length; rebuildWon(rows); } }
  async function refreshWinners(){
    if(!st.roundId) return;
    const rows=await rpc('dd_winners_list',{p_round:st.roundId});
    st.winCount=Array.isArray(rows)?rows.length:st.winCount; rebuildWon(rows);
    const box=$('wlist'); if(!box) return;
    if(!rows||!rows.length){ box.innerHTML='<div class="pempty">Chưa có người trúng.</div>'; return; }
    box.innerHTML=rows.map(w=>'<div class="wcard"><div class="ic">🏆</div><div style="flex:1;min-width:0"><div class="pz">'+esc(w.prize)+'</div><div class="nm">'+esc(w.name)+' <span class="ph">'+esc(w.phone_masked)+'</span></div></div></div>').join('');
  }

  // ---------- controls ----------
  function renderCtrl(){
    const bar=$('ctrlBar');
    if(!token){ bar.classList.add('hidden'); bar.innerHTML=''; lastCtrlKey='notoken'; return; }
    const s=st.status;
    if(s==='registration'||s==='closed'){
      bar.classList.add('hidden'); bar.innerHTML='';
      const qs=$('qrStart'); if(qs && qs.dataset.k!=='start'){ qs.dataset.k='start'; qs.innerHTML='<button class="qstart">▶ BẮT ĐẦU</button>'; qs.querySelector('button').addEventListener('click',()=>setStatus('countdown')); }
      lastCtrlKey='reg'; return;
    }
    if(!st.roundId || s==='finished'){ if(lastCtrlKey!=='hide'){ bar.classList.add('hidden'); bar.innerHTML=''; lastCtrlKey='hide'; } return; }
    const more=effWin()<totalSlots();
    const key=s+'|'+more+'|'+spinning; if(key===lastCtrlKey) return; lastCtrlKey=key;
    let h='';
    if(s==='countdown'){ h='<button class="b-finish" data-a="finished">⏹ Kết thúc</button>'; }
    else if(s==='playing'){ if(more && !spinning) h+='<button class="b-next" data-a="countdown">🔄 '+(gameType==='wheel'?'QUAY TIẾP':'CHƠI TIẾP')+'</button>'; h+='<button class="b-finish" data-a="finished">⏹ Kết thúc</button>'; }
    bar.innerHTML=h; bar.classList.remove('hidden');
    bar.querySelectorAll('button').forEach(b=>b.addEventListener('click',function(){ const a=this.dataset.a; if(a==='finished' && !confirm('Kết thúc game?')) return; setStatus(a); }));
  }

  // ---------- countdown tick ----------
  setInterval(function(){
    if(mode!=='countdown'||!st.countdownAt) return;
    const nowS=Date.now()+st.skew;
    let remain=CD_TOTAL-(nowS-st.countdownAt)/1000; if(remain<0)remain=0;
    const el=$('cdNum'); if(el) el.textContent=Math.ceil(remain);
    const pz=$('cdPrize'); if(pz){ const g=currentGroup(); pz.textContent=g?('🎁 '+g.name+(g.quantity>1?(' ('+g.slot+'/'+g.quantity+')'):'')):'🎁 Giải thưởng'; }
    if(remain<=0 && !drawStarted){
      drawStarted=true;
      if(token){ rpc('dd_admin_set_status',{p_token:token,p_round:st.roundId,p_status:'playing'}); }
      setMode('play'); triggerDraw();
    }
  },120);

  // ---------- main poll ----------
  async function poll(){
    const rows=await rpc('dd_active_round');
    const r=Array.isArray(rows)?rows[0]:null;
    if(!r){ st.roundId=null; st.status=null; setMode('idle'); renderCtrl(); return; }
    if(r.server_now) st.skew=new Date(r.server_now).getTime()-Date.now();
    const changedRound=st.roundId!==r.id;
    if(changedRound){ wonSet=new Set(); winHandled=false; drawSignal=null; drawStarted=false; spinning=false; st.winCount=0; const rc=$('raceContainer'); if(rc) rc.remove(); iframeReady=false; }
    st.roundId=r.id; st.status=r.status; st.prizes=parsePrizes(r.prize);
    st.countdownAt=r.countdown_at?new Date(r.countdown_at).getTime():null; st.count=r.player_count||0;

    if(r.status==='registration' || r.status==='closed'){
      drawStarted=false; drawSignal=null;
      if(token) await refreshPlayersAdmin();
      await fetchWinCount();
      setMode('reg');
      const sEl=$('dStatus'); if(sEl){ if(r.status==='registration'){ sEl.className='status st-open'; sEl.textContent='🔓 Đang mở đăng ký'; } else { sEl.className='status st-closed'; sEl.textContent='🔒 Đã ngưng nhận — chuẩn bị bắt đầu'; } }
      const pr=$('prizeRow'); if(pr){ const html=st.prizes.map(p=>'<span class="pchip">🎁 '+esc(p.name)+(p.quantity>1?(' ×'+p.quantity):'')+'</span>').join(''); if(pr.dataset.sig!==html){ pr.dataset.sig=html; pr.innerHTML=html; } }
      await refreshBoardPublic();
    } else if(r.status==='countdown'){
      if(drawSignal!==r.countdown_at){ drawSignal=r.countdown_at; drawStarted=false; winHandled=false; }
      if(token) await refreshPlayersAdmin();
      await fetchWinCount();
      setMode('countdown');
      if(gameType==='race'){ ensureRace(); sendParticipants(); }
    } else if(r.status==='playing'){
      if(token) await refreshPlayersAdmin();
      await fetchWinCount();
      if(mode!=='play') setMode('play');
      if(gameType==='race' && iframeReady) sendParticipants();
    } else if(r.status==='finished'){
      setMode('finished'); refreshWinners();
    }
    renderCtrl();
  }

  poll(); setInterval(poll,1500);
})();
</script>
